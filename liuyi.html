<!-- 沿用上面所有样式，仅替换JS部分即可 -->
<script>
    const coupon = document.getElementById('coupon');
    const mask = document.getElementById('mask');
    const close = document.getElementById('close');
    const unlockBtn = document.getElementById('unlockBtn');
    const innerTip = document.getElementById('innerTip');
    const flashTip = document.getElementById('flashTip');
    const heartBox = document.getElementById('heartBox');

    let step1 = false;
    let step2 = false;
    // DOM池：预创建10个爱心节点，循环复用，不新增DOM
    const poolSize = 10;
    const heartPool = [];

    // 初始化DOM池
    for(let i=0; i<poolSize; i++){
        let h = document.createElement('div');
        h.className = 'heart-fall';
        h.textContent = '❤';
        heartPool.push(h);
    }

    coupon.addEventListener('click', function(){
        if(!step1){
            coupon.classList.add('open');
            step1 = true;
            return;
        }
        if(step1 && !step2){
            step2 = true;
            flashTip.style.display = "none";
            innerTip.classList.add('show');
            unlockBtn.classList.add('show');
        }
    });

    unlockBtn.addEventListener('click', function(){
        mask.style.display = 'flex';
        reuseHeartPool();
    });

    close.addEventListener('click',()=>{
        mask.style.display = 'none';
    });
    mask.addEventListener('click',(e)=>{
        if(e.target === mask) mask.style.display = 'none';
    });

    // 复用DOM池，循环播放40个爱心效果
    function reuseHeartPool() {
        heartBox.innerHTML = '';
        const total = 40;
        let idx = 0;

        function play() {
            if(idx >= total) return;
            const h = heartPool[idx % poolSize];
            const size = Math.random() * 6 + 10;
            const left = Math.random() * 100;

            h.style.fontSize = `${size}px`;
            h.style.left = `${left}%`;
            h.style.animation = 'none';
            h.offsetHeight; // 强制刷新样式
            h.style.animation = 'heart-fall 6s linear forwards';

            heartBox.appendChild(h);
            idx++;
            setTimeout(play, 250);
        }
        play();
    }
</script>
