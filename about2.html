<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字身份大闯关</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
        body{
            background:#f5f7fa;
            display: flex;
            justify-content: center;
            padding: 15px 0;
        }
        .container{
            width: 88vw;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .header{
            background:linear-gradient(135deg,#4F46E5,#81CFE8);
            color:white;
            padding:16px 16px;
            text-align:center;
        }
        .header h1{font-size:24px;margin-bottom:4px}
        .content{padding:15px 20px}
        .screen{display:none}
        .screen.active{display:block}
        input{
            width:100%;padding:14px;border:2px solid #eee;border-radius:12px;font-size:16px;margin-top:10px;
        }
        .btn{
            width:100%;padding:16px;background:#4F46E5;color:white;border:none;border-radius:12px;font-size:17px;font-weight:bold;margin-top:12px;
        }
        .options-grid{
            display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px
        }
        .option{
            display:flex;flex-direction:column;align-items:center;justify-content:center;background:white;border:3px solid #E5E7EB;border-radius:14px;padding:12px 8px;cursor:pointer
        }
        .option svg{
            width:100%;height:90px;object-fit:contain;margin-bottom:8px;border-radius:6px
        }
        .option.selected{border-color:#4F46E5;background:#EEF2FF}
        .option.correct{border-color:#10B981;background:#ECFDF5}
        .option.wrong{border-color:#EF4444;background:#FEF2F2}
        .feedback{
            margin-top:12px;padding:12px;border-radius:12px;font-size:14px;display:none
        }
        #q-progress{font-size:14px;color:#666}
        #question-text{font-size:16px;margin:8px 0 12px}
        .modal-overlay{
            position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center
        }
        .modal-overlay.active{display:flex}
        .modal-content{
            background:white;padding:25px;border-radius:16px;width:90%;max-width:420px;text-align:center
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎓 数字身份大闯关</h1>
        <p>成绩实时同步给老师</p>
    </div>
    <div class="content">
        <div id="screen-login" class="screen active">
            <h3>请输入电脑编号：</h3>
            <input type="text" id="studentName" placeholder="例如：01">
            <button class="btn" onclick="app.startQuiz()">开始挑战 🚀</button>
        </div>
        <div id="screen-quiz" class="screen">
            <div id="q-progress">题目 1/10</div>
            <h3 id="question-text"></h3>
            <div class="options-grid" id="options-area"></div>
            <div id="feedback-area" class="feedback"></div>
            <button id="next-btn" class="btn" onclick="app.nextQuestion()" disabled>下一题 ➡️</button>
        </div>
        <div id="screen-submit" class="screen" style="text-align:center">
            <div style="font-size:60px">📡</div>
            <h3>正在上传成绩...</h3>
        </div>
        <div id="screen-success" class="screen" style="text-align:center">
            <div style="font-size:70px">🎉</div>
            <h2>闯关完成！</h2>
            <div style="font-size:24px;font-weight:bold;color:#4F46E5;margin:12px 0" id="final-score"></div>
            <div id="upload-status" style="font-size:16px;font-weight:bold;margin-bottom:12px"></div>
            <button class="btn" onclick="location.reload()">再玩一次</button>
        </div>
    </div>
</div>
<div id="submit-modal" class="modal-overlay">
    <div class="modal-content">
        <h2>提交成绩</h2>
        <p>是否将成绩提交给老师？</p>
        <button class="btn" style="background:#10B981" onclick="app.submitToTeacher()">✅ 确认提交</button>
        <button class="btn" style="background:#eee;color:#333;margin-top:10px" onclick="app.closeModalAndShowResult()">❌ 暂不提交</button>
    </div>
</div>

class QuizApp {
    constructor(){
        this.currentIdx=0;
        this.score=0;
        this.userName="";
        this.userAnswers=[];
        this.isSubmitting = false;
    }
    startQuiz(){
        const n=document.getElementById("studentName").value.trim();
        if(!n)return alert("请输入电脑编号！");
        this.userName=n;
        this.switchScreen("screen-quiz");
        this.loadQuestion();
    }
    switchScreen(id){
        document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
    }
    loadQuestion(){
        const d=quizData[this.currentIdx];
        document.getElementById("q-progress").innerText=`题目 ${this.currentIdx+1}/10`;
        document.getElementById("question-text").innerText=d.q;
        document.getElementById("feedback-area").style.display="none";
        document.getElementById("next-btn").disabled=true;
        const b=document.getElementById("options-area");
        b.innerHTML="";
        d.opts.forEach((o,i)=>{
            let div=document.createElement("div");
            div.className="option";
            div.innerHTML=`${o.svg}<span>${o.text}</span>`;
            div.onclick=()=>this.select(div,o.text);
            b.appendChild(div);
        });
    }
    select(el,t){
        if(!document.getElementById("next-btn").disabled)return;
        document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
        el.classList.add("selected");
        const d=quizData[this.currentIdx];
        const ok=t.startsWith(d.ans);
        if(ok)this.score+=10;
        const f=document.getElementById("feedback-area");
        f.style.display="block";
        f.innerHTML=`<strong>${ok?"✅ 正确":"❌ 错误"}</strong><br>${d.exp}`;
        f.style.background=ok?"#ECFDF5":"#FEF2F2";
        el.classList.add(ok?"correct":"wrong");
        document.getElementById("next-btn").disabled=false;
        this.userAnswers[this.currentIdx]={q:d.q,user:t,isCorrect:ok};
    }
    nextQuestion(){
        this.currentIdx++;
        if(this.currentIdx>=10){
            document.getElementById("submit-modal").classList.add("active");
        }else{
            this.loadQuestion();
        }
    }
    closeModalAndShowResult(){
        document.getElementById("submit-modal").classList.remove("active");
        this.showResult(false);
    }
    async submitToTeacher(){
        if(this.isSubmitting) return;
        this.isSubmitting = true;

        document.getElementById("submit-modal").classList.remove("active");
        this.switchScreen("screen-submit");
        try {
            let res = await fetch(API_LATEST, { headers: { 'X-Master-Key': API_KEY } });
            let json = await res.json();
            let records = json.record || [];
            if (!Array.isArray(records)) records = [];
            
            const newRecord = {
                name: this.userName,
                score: this.score,
                date: new Date().toLocaleString(),
                userAnswers: this.userAnswers
            };
            records.push(newRecord);
            
            await fetch(API_URL, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': API_KEY
                },
                body: JSON.stringify(records)
            });
        }catch(e){
            console.log("提交静默失败");
        }
        setTimeout(()=>{
            this.showResult(true);
            this.isSubmitting = false;
        },1000);
    }
    showResult(up){
        this.switchScreen("screen-success");
        document.getElementById("final-score").innerText=`得分：${this.score} / 100`;
        document.getElementById("upload-status").innerText=up?"✅ 成绩已提交老师":"⚠️ 成绩未提交";
    }
}
const app=new QuizApp();
</script>
</body>
</html>
