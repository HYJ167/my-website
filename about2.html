<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字身份大闯关 - 学生端</title>
    <style>
        :root { --primary: #4F46E5; --success: #10B981; --bg: #F3F4F6; --card: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { background: var(--card); width: 100%; max-width: 600px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        .header { background: linear-gradient(135deg, var(--primary), #818CF8); color: white; padding: 30px; text-align: center; }
        .content { padding: 30px; flex: 1; }
        .screen { display: none; animation: fade 0.4s; }
        .screen.active { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; }
        input:focus { border-color: var(--primary); outline: none; }
        
        .btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        
        .option { padding: 15px; border: 2px solid #eee; margin-bottom: 10px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .option:hover { background: #f9fafb; border-color: #cbd5e1; }
        .option.selected { border-color: var(--primary); background: #EEF2FF; color: var(--primary); font-weight: bold; }
        .option.correct { border-color: var(--success); background: #ECFDF5; color: #065F46; }
        .option.wrong { border-color: #EF4444; background: #FEF2F2; color: #991B1B; }
        
        .feedback { margin-top: 20px; padding: 15px; background: #f3f4f6; border-radius: 10px; display: none; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        .modal-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-success { background: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>🎓 数字身份大闯关</h1><p>成绩实时同步给老师</p></div>
    <div class="content">
        <!-- 登录页 -->
        <div id="screen-login" class="screen active">
            <label style="font-weight:bold; display:block; margin-bottom:8px;">请输入你的姓名/学号：</label>
            <input type="text" id="studentName" placeholder="例如：张三">
            <button class="btn" onclick="app.startQuiz()">开始挑战 🚀</button>
        </div>

        <!-- 答题页 -->
        <div id="screen-quiz" class="screen">
            <div style="display:flex; justify-content:space-between; color:#666; margin-bottom:10px;">
                <span id="q-progress">题目 1/10</span>
            </div>
            <h3 id="question-text" style="margin-bottom:20px;"></h3>
            <div id="options-area"></div>
            <div id="feedback-area" class="feedback"></div>
            <button id="next-btn" class="btn" style="margin-top:20px;" onclick="app.nextQuestion()" disabled>下一题 ➡️</button>
        </div>

        <!-- 提交中 -->
        <div id="screen-submit" class="screen" style="text-align:center;">
            <div style="font-size:40px;">📡</div>
            <h3>正在上传数据到云端...</h3>
            <p>请勿关闭页面</p>
        </div>

        <!-- 成功页 -->
        <div id="screen-success" class="screen" style="text-align:center;">
            <div style="font-size:60px;">🎉</div>
            <h2>提交成功！</h2>
            <div id="upload-status" style="color:var(--success); font-weight:bold; margin:10px 0;">✅ 已上传闯关成绩！</div>
            <div style="font-size:24px; font-weight:bold; color:var(--primary);" id="final-score"></div>
            <button onclick="location.reload()" class="btn" style="margin-top:20px;">再玩一次</button>
        </div>
    </div>
</div>

<!-- 确认提交弹窗 -->
<div id="submit-modal" class="modal-overlay">
    <div class="modal-content">
        <div style="font-size:40px;">📤</div>
        <h3>闯关完成！</h3>
        <p>是否将成绩 (<span id="modal-score" style="font-weight:bold; color:var(--primary)">0</span>分) 提交给老师？</p>
        <div class="modal-actions">
            <button id="btn-submit-confirm" class="btn btn-success" onclick="app.submitToTeacher()">✅ 确认提交</button>
            <button class="btn" style="background:#eee; color:#333;" onclick="app.closeModalAndShowResult()">❌ 暂不提交</button>
        </div>
        <p id="submit-loading" style="display:none; color:#666; font-size:12px; margin-top:10px;">正在上传...</p>
    </div>
</div>

<script>
    // ================= ⚠️ 重要：配置区域 ⚠️ =================
    // 【已修正】添加了缺失的 /api/v1/ 段落
    const API_URL = 'https://69bfbe0b72ca04f3bcb91b38.mockapi.io/api/v1/results'; 
    // =======================================================

    const quizData = [
        { q: "1. 数字身份指的是什么？", opts: ["A. 现实身份证", "B. 网络在线身份", "C. 学籍号", "D. 家庭住址"], ans: "B", exp: "数字身份是我们在网络世界中的通行证。" },
        { q: "2. 注册账号时，常用于实名认证的方式？", opts: ["A. 宠物名", "B. 手机号或刷脸", "C. 自我介绍", "D. 风景照"], ans: "B", exp: "手机号和刷脸能确保身份真实。" },
        { q: "3. 数字身份具有唯一性的原因？", opts: ["A. 可注册多号", "B. 名字可变", "C. 实名认证锁定真人", "D. 平台不记录"], ans: "C", exp: "实名认证让每个数字身份对应唯一的真人。" },
        { q: "4. 小智妈妈网购快速退款因为？", opts: ["A. 衣服贵", "B. 信用分高", "C. 是亲戚", "D. 常退货"], ans: "B", exp: "高信用分代表诚信记录好。" },
        { q: "5. 哪种行为损害信用价值？", opts: ["A. 按时作业", "B. 发布虚假信息", "C. 帮助同学", "D. 每天登录"], ans: "B", exp: "发布虚假信息是不诚信行为。" },
        { q: "6. 数字身份的作用类似于？", opts: ["A. 学生证", "B. 网络通行证", "C. 钥匙", "D. 公交卡"], ans: "B", exp: "它是开展在线活动的凭证。" },
        { q: "7. 以下属于数字身份的是？", opts: ["A. 社交账号", "B. 户口本", "C. 日记本", "D. 书包"], ans: "A", exp: "社交账号是典型的数字身份。" },
        { q: "8. 网友被封号通常因为？", opts: ["A. 不常登录", "B. 发布虚假/不良信息", "C. 没实名", "D. 用别人号"], ans: "B", exp: "违规发布内容是主要原因。" },
        { q: "9. 信用价值体现在？", opts: ["A. 免押金租车", "B. 游戏皮肤", "C. 免费电影", "D. 不写作业"], ans: "A", exp: "信用好可享受免押金等便利。" },
        { q: "10. 实名认证的主要目的？", opts: ["A. 好记", "B. 增加数量", "C. 关联现实，责任追溯", "D. 美观"], ans: "C", exp: "便于追溯现实中的责任人。" }
    ];

    class QuizApp {
        constructor() {
            this.currentIdx = 0;
            this.score = 0;
            this.userName = "";
            this.userAnswers = [];
        }

        startQuiz() {
            const nameInput = document.getElementById('studentName');
            if (!nameInput.value.trim()) return alert("请先输入姓名！");
            this.userName = nameInput.value.trim();
            this.switchScreen('screen-quiz');
            this.loadQuestion();
        }

        switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        loadQuestion() {
            const data = quizData[this.currentIdx];
            document.getElementById('q-progress').innerText = `题目 ${this.currentIdx + 1}/${quizData.length}`;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('feedback-area').style.display = 'none';
            document.getElementById('next-btn').disabled = true;

            const optsDiv = document.getElementById('options-area');
            optsDiv.innerHTML = '';
            data.opts.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'option';
                div.innerText = opt;
                div.onclick = () => this.selectOption(div, opt);
                optsDiv.appendChild(div);
            });
        }

        selectOption(el, text) {
            if (!document.getElementById('next-btn').disabled) return;
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');

            const correctAns = quizData[this.currentIdx].ans;
            const isCorrect = text.startsWith(correctAns);
            if (isCorrect) this.score += 10;

            const fb = document.getElementById('feedback-area');
            fb.style.display = 'block';
            fb.innerHTML = `<strong>${isCorrect ? '✅ 正确' : '❌ 错误'}</strong><br>${quizData[this.currentIdx].exp}`;
            fb.style.background = isCorrect ? '#ECFDF5' : '#FEF2F2';
            fb.style.color = isCorrect ? '#065F46' : '#991B1B';

            el.classList.add(isCorrect ? 'correct' : 'wrong');
            this.userAnswers.push({ q: quizData[this.currentIdx].q, user: text, isCorrect: isCorrect });
            document.getElementById('next-btn').disabled = false;
        }

        nextQuestion() {
            this.currentIdx++;
            if (this.currentIdx >= quizData.length) {
                this.showSubmitModal();
            } else {
                this.loadQuestion();
            }
        }

        showSubmitModal() {
            document.getElementById('modal-score').innerText = this.score;
            document.getElementById('submit-modal').classList.add('active');
        }

        closeModalAndShowResult() {
            document.getElementById('submit-modal').classList.remove('active');
            this.showResult(false);
        }

        async submitToTeacher() {
            const btn = document.getElementById('btn-submit-confirm');
            const loading = document.getElementById('submit-loading');
            btn.disabled = true;
            loading.style.display = 'block';

            try {
                const payload = {
                    name: this.userName,
                    score: Number(this.score),
                    total: 100,
                };

                console.log("🚀 正在提交数据:", payload);
                console.log("🔗 目标地址:", API_URL);

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const responseText = await response.text();

                if (response.ok || response.status === 201) {
                    console.log("✅ 上传成功！服务器响应:", responseText);
                    setTimeout(() => {
                        document.getElementById('submit-modal').classList.remove('active');
                        this.showResult(true);
                    }, 1000);
                } else {
                    console.error("❌ 上传失败:", response.status, responseText);
                    throw new Error(`服务器拒绝请求 (${response.status})`);
                }
            } catch (e) {
                console.error("💥 异常捕获:", e);
                let msg = "上传失败：" + e.message;
                
                if (e.message.includes('404')) {
                    msg += "\n\n💡 原因：地址错了！\n请检查代码中的 API_URL 是否包含了 '/api/v1/' 这一段。";
                } else if (e.message.includes('400')) {
                    msg += "\n\n💡 原因：数据格式不对。\n请去 MockAPI 把 'results' 资源删了，重新建一个空的。";
                }
                
                alert(msg);
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }

        showResult(isUploaded) {
            this.switchScreen('screen-success');
            document.getElementById('final-score').innerText = `得分：${this.score} / 100`;
            document.getElementById('upload-status').style.display = isUploaded ? 'block' : 'none';
            document.getElementById('upload-status').innerText = isUploaded ? '✅ 已上传闯关成绩！' : '⚠️ 成绩未上传';
        }
    }

    const app = new QuizApp();
</script>
</body>
</html>
