<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你曾经用过的数字身份</title>
<style>
*{box-sizing:border-box;font-family:"Microsoft YaHei"}
body{background:#f7f9fc;padding:20px}
.box{max-width:500px;margin:0 auto;background:white;border-radius:16px;padding:28px;box-shadow:0 2px 20px rgba(0,0,0,0.05)}
h2{text-align:center;color:#4F46E5;margin-bottom:24px}
.input-row{display:flex; gap:10px; margin-bottom:24px; align-items:center; justify-content:center}
.input-row input{width:160px; padding:12px; font-size:16px; border:1px solid #ddd; border-radius:8px; text-align:center}
.input-row button{padding:12px 20px; background:#4F46E5; color:white; border:none; border-radius:8px; cursor:pointer}
.item{margin:16px 0; display:flex; align-items:center; gap:12px; font-size:16px}
input[type="checkbox"]{width:22px;height:22px}
.btn{background:#4F46E5; color:white; border:none; width:100%; padding:16px; border-radius:12px; font-size:16px; margin-top:24px; cursor:pointer}
.btn:disabled{background:#ccc; cursor:not-allowed}
.tip{text-align:center; color:#059669; margin-top:16px; font-size:16px; display:none; font-weight:bold}
</style>
</head>
<body>
<div class="box">
  <h2>你曾经用过的数字身份</h2>
  <div class="input-row">
    <input type="text" placeholder="请输入编号（如02）" id="stuId" maxlength="2">
    <button onclick="bindId()">确定</button>
  </div>
  <div class="item"><input type="checkbox" id="a1" disabled><label>社交账号（微信、QQ）</label></div>
  <div class="item"><input type="checkbox" id="a2" disabled><label>购物账号（淘宝、拼多多）</label></div>
  <div class="item"><input type="checkbox" id="a3" disabled><label>短视频账号（抖音、B站、快手等）</label></div>
  <div class="item"><input type="checkbox" id="a4" disabled><label>音乐/听书账号（网易云、喜马拉雅等）</label></div>
  <div class="item"><input type="checkbox" id="a5" disabled><label>游戏账号（王者荣耀、迷你世界等）</label></div>
  <div class="item"><input type="checkbox" id="a6" disabled><label>学习类账号（作业帮、一起学等）</label></div>
  <button class="btn" id="btn" disabled onclick="submit()">提交</button>
  <div class="tip" id="msg">提交成功！</div>
</div>

<script>
const BIN_ID = "69d8a874856a6821891a601b";
const API_KEY = "$2a$10$.B7BgbCtQWdTjV4cT0EnoeWEp5QcavXW9y0nmP3rXnGvndnBP9C6u";
let currentNum=null;

function formatTwoDigits(num){return num.toString().padStart(2,'0');}
function getGroup(num){return (num-1)%4;}

async function bindId(){
  let val=document.getElementById("stuId").value.trim();
  if(!val||isNaN(val)||val<1||val>99){alert("请输入01-99");return;}
  currentNum=parseInt(val);
  document.querySelectorAll("input[type=checkbox]").forEach(c=>c.disabled=false);
  document.getElementById("btn").disabled=false;
  document.getElementById("stuId").disabled=true;
  document.querySelector(".input-row button").disabled=true;
}

async function submit(){
  let g=getGroup(currentNum);
  let a1=document.getElementById("a1").checked;
  let a2=document.getElementById("a2").checked;
  let a3=document.getElementById("a3").checked;
  let a4=document.getElementById("a4").checked;
  let a5=document.getElementById("a5").checked;
  let a6=document.getElementById("a6").checked;

  let res=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{"X-Master-Key":API_KEY}});
  let data=(await res.json()).record||{wx:[0,0,0,0],qq:[0,0,0,0],sp:[0,0,0,0],music:[0,0,0,0],game:[0,0,0,0],art:[0,0,0,0],totalStu:0};

  if(a1)data.wx[g]++;
  if(a2)data.qq[g]++;
  if(a3)data.sp[g]++;
  if(a4)data.music[g]++;
  if(a5)data.game[g]++;
  if(a6)data.art[g]++;
  data.totalStu++;

  await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
    method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
    body:JSON.stringify(data)
  });

  document.getElementById("msg").style.display="block";
  document.getElementById("btn").disabled=true;
  document.getElementById("btn").innerText="已提交";
}
</script>
</body>
</html>
