<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的数字身份</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",Arial}
body{background:#f7f9fc;padding:40px 20px;}
.box{
    max-width:600px;
    margin:0 auto;
    background:#fff;
    padding:40px;
    border-radius:16px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}
.title{
    text-align:center;
    color:#4F46E5;
    margin-bottom:30px;
    font-size:28px;
}
.item{
    margin:22px 0;
    display:flex;
    align-items:center;
    gap:14px;
    font-size:20px;
}
input[type="checkbox"]{
    width:26px;
    height:26px;
    accent-color:#4F46E5;
}
.btn{
    background:#4F46E5;
    color:#fff;
    border:none;
    padding:18px;
    border-radius:10px;
    font-size:20px;
    cursor:pointer;
    width:100%;
    margin-top:25px;
    transition: all 0.2s;
}
.btn:disabled{
    background:#999;
    cursor:not-allowed;
}
.tip{
    text-align:center;
    color:#10B981;
    font-weight:bold;
    font-size:20px;
    margin-top:18px;
    display:none;
}
</style>
</head>
<body>
<div class="box">
    <h2 class="title">我的数字身份</h2>
    <div class="item">
        <input type="checkbox" id="qq">
        <label>QQ</label>
    </div>
    <div class="item">
        <input type="checkbox" id="wechat">
        <label>微信</label>
    </div>
    <div class="item">
        <input type="checkbox" id="game">
        <label>游戏账号</label>
    </div>
    <div class="item">
        <input type="checkbox" id="study">
        <label>学习平台</label>
    </div>
    <div class="item">
        <input type="checkbox" id="douyin">
        <label>抖音</label>
    </div>
    <button class="btn" id="submitBtn" onclick="submitData()">提交我的身份</button>
    <div class="tip" id="msg">提交成功！</div>
</div>

<script>
// 🔴 本地存储键名（全局唯一，教师端用同一个）
const STORAGE_KEY = "digital_identity_stats";

// 页面加载时，检查是否已经提交过
window.onload = function() {
    const hasSubmitted = localStorage.getItem("hasSubmitted");
    if(hasSubmitted === "true") {
        document.getElementById("submitBtn").disabled = true;
        document.getElementById("submitBtn").innerText = "已提交";
        document.getElementById("msg").style.display = "block";
        document.getElementById("msg").innerText = "你已提交过，无需重复提交";
    }
};

async function submitData(){
    const btn = document.getElementById("submitBtn");
    const msg = document.getElementById("msg");

    // 🔥 双重防重复：状态锁+按钮禁用
    if(btn.disabled) return;
    btn.disabled = true;
    btn.innerText = "提交中...";

    // 读取勾选状态
    const qq = document.getElementById("qq").checked ? 1 : 0;
    const wechat = document.getElementById("wechat").checked ? 1 : 0;
    const game = document.getElementById("game").checked ? 1 : 0;
    const study = document.getElementById("study").checked ? 1 : 0;
    const douyin = document.getElementById("douyin").checked ? 1 : 0;

    try{
        // 1. 从本地存储读取当前统计数据
        let currentData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
            qq:0, wechat:0, game:0, study:0, douyin:0, totalStudent:0
        };

        // 2. 累加新数据
        currentData.qq += qq;
        currentData.wechat += wechat;
        currentData.game += game;
        currentData.study += study;
        currentData.douyin += douyin;
        currentData.totalStudent += 1;

        // 3. 写回本地存储（100%成功，无网络依赖）
        localStorage.setItem(STORAGE_KEY, JSON.stringify(currentData));
        // 标记当前学生已提交
        localStorage.setItem("hasSubmitted", "true");

        // 4. 提交成功
        msg.style.display = "block";
        msg.innerText = "提交成功！";
        btn.innerText = "已提交";

        // 通知教师端刷新数据
        window.dispatchEvent(new StorageEvent('storage', {
            key: STORAGE_KEY,
            newValue: JSON.stringify(currentData)
        }));

    } catch (error) {
        console.error("提交错误:", error);
        msg.style.display = "block";
        msg.style.color = "#EF4444";
        msg.innerText = "提交失败，请重试";
        btn.disabled = false;
        btn.innerText = "提交我的身份";
    }
}
</script>
</body>
</html>
