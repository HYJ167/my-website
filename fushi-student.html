<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>我的数字身份</title>
<style>
body{background:#f5f7fa;padding:30px;font-family:微软雅黑}
.box{max-width:400px;margin:0 auto;background:white;padding:25px;border-radius:12px}
.title{text-align:center;color:#2d8cf0}
.item{margin:14px 0}
button{background:#2d8cf0;color:white;border:none;padding:10px 20px;border-radius:6px;width:100%}
.success{color:green;text-align:center;margin-top:10px;display:none}
</style>
</head>
<body>
<div class="box">
  <h2 class="title">我的数字身份</h2>
  <div class="item"><input type="checkbox" id="qq"> QQ</div>
  <div class="item"><input type="checkbox" id="wechat"> 微信</div>
  <div class="item"><input type="checkbox" id="game"> 游戏账号</div>
  <div class="item"><input type="checkbox" id="study"> 学习平台</div>
  <div class="item"><input type="checkbox" id="douyin"> 抖音</div>
  <button onclick="submit()">提交</button>
  <div class="success" id="msg">提交成功！</div>
</div>

<script>
// 只改这里！！！
const API_KEY = "把你的X-Master-Key粘这里";
const BIN_ID = "把你的Bin ID粘这里";

async function submit() {
  let data = {
    qq: document.getElementById("qq").checked ? 1 : 0,
    wechat: document.getElementById("wechat").checked ? 1 : 0,
    game: document.getElementById("game").checked ? 1 : 0,
    study: document.getElementById("study").checked ? 1 : 0,
    douyin: document.getElementById("douyin").checked ? 1 : 0
  };

  await fetch(\`https://api.jsonbin.io/v3/b/\${BIN_ID}/latest\`, {
    headers: { "X-Master-Key": API_KEY }
  }).then(res => res.json()).then(oldData => {
    let newData = {
      qq: oldData.record.qq + data.qq,
      wechat: oldData.record.wechat + data.wechat,
      game: oldData.record.game + data.game,
      study: oldData.record.study + data.study,
      douyin: oldData.record.douyin + data.douyin,
      totalStudent: oldData.record.totalStudent + 1
    };

    fetch(\`https://api.jsonbin.io/v3/b/\${BIN_ID}\`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": API_KEY
      },
      body: JSON.stringify(newData)
    }).then(() => {
      document.getElementById("msg").style.display = "block";
      setTimeout(() => {
        document.getElementById("msg").style.display = "none";
        document.querySelectorAll("input").forEach(i => i.checked = false);
      }, 1500);
    });
  });
}
</script>
</body>
</html>
