<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的数字身份</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",Arial}
body{background:#f7f9fc;padding:40px 20px;}
.box{
    max-width:600px; /* 放大宽度 */
    margin:0 auto;
    background:#fff;
    padding:40px; /* 放大内边距 */
    border-radius:16px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}
.title{
    text-align:center;
    color:#4F46E5;
    margin-bottom:30px;
    font-size:28px; /* 放大标题 */
}
.item{
    margin:22px 0;
    display:flex;
    align-items:center;
    gap:14px;
    font-size:20px; /* 放大文字 */
}
input[type="checkbox"]{
    width:26px; /* 放大勾选框 */
    height:26px;
    accent-color:#4F46E5;
}
.btn{
    background:#4F46E5;
    color:#fff;
    border:none;
    padding:18px;
    border-radius:10px;
    font-size:20px; /* 放大按钮文字 */
    cursor:pointer;
    width:100%;
    margin-top:25px;
}
.btn:disabled{
    background:#999;
    cursor:not-allowed;
}
.tip{
    text-align:center;
    color:#10B981;
    font-weight:bold;
    font-size:20px;
    margin-top:18px;
    display:none;
}
</style>
</head>
<body>
<div class="box">
    <h2 class="title">我的数字身份</h2>
    <div class="item">
        <input type="checkbox" id="qq">
        <label>QQ</label>
    </div>
    <div class="item">
        <input type="checkbox" id="wechat">
        <label>微信</label>
    </div>
    <div class="item">
        <input type="checkbox" id="game">
        <label>游戏账号</label>
    </div>
    <div class="item">
        <input type="checkbox" id="study">
        <label>学习平台</label>
    </div>
    <div class="item">
        <input type="checkbox" id="douyin">
        <label>抖音</label>
    </div>
    <button class="btn" id="submitBtn" onclick="submitData()">提交我的身份</button>
    <div class="tip" id="msg">提交成功！</div>
</div>

<script>
const API_KEY = "$2a$10$.B7BgbCtQWdTjV4cT0EnoeWEp5QcavXW9y0nmP3rXnGvndnBP9C6u";
const BIN_ID = "69d906ea5a7d7921ae2823a0";
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

async function submitData(){
    let btn = document.getElementById("submitBtn");
    let msg = document.getElementById("msg");

    // 🔥 防重复提交：提交一次就禁用按钮
    if(btn.disabled) return;
    btn.disabled = true;
    btn.innerText = "提交中...";

    const qq = document.getElementById("qq").checked ? 1 : 0;
    const wechat = document.getElementById("wechat").checked ? 1 : 0;
    const game = document.getElementById("game").checked ? 1 : 0;
    const study = document.getElementById("study").checked ? 1 : 0;
    const douyin = document.getElementById("douyin").checked ? 1 : 0;

    try{
        let res = await fetch(`${API_URL}/latest?ts=${Date.now()}`,{
            headers:{"X-Master-Key":API_KEY,"Cache-Control":"no-cache"}
        });
        let data = await res.json();
        let old = data.record;

        let newData = {
            qq: old.qq + qq,
            wechat: old.wechat + wechat,
            game: old.game + game,
            study: old.study + study,
            douyin: old.douyin + douyin,
            totalStudent: old.totalStudent + 1
        };

        await fetch(API_URL,{
            method:"PUT",
            headers:{"Content-Type":"application/json","X-Master-Key":API_KEY,"Cache-Control":"no-cache"},
            body:JSON.stringify(newData)
        });

        msg.style.display = "block";
        setTimeout(()=>{
            msg.style.display = "none";
        },2000);

    }catch(e){
        alert("提交失败，请联系老师");
        btn.disabled = false;
        btn.innerText = "提交我的身份";
    }
}
</script>
</body>
</html>
