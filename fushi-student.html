<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的数字身份</title>
<style>
*{box-sizing:border-box;font-family:"Microsoft YaHei"}
body{background:#f7f9fc;padding:20px}
.box{max-width:500px;margin:0 auto;background:white;border-radius:16px;padding:28px}
h2{text-align:center;color:#4F46E5;margin-bottom:20px}
.input-row{
  display:flex; gap:10px; margin-bottom:20px;
  align-items:center; justify-content:center;
}
.input-row input{
  width:140px; padding:12px; font-size:16px;
  border:1px solid #ddd; border-radius:8px;
  text-align:center;
}
.input-row button{
  padding:12px 16px; background:#4F46E5; color:white;
  border:none; border-radius:8px; cursor:pointer;
}
.item{margin:14px 0;display:flex;align-items:center;gap:12px;font-size:16px}
input[type="checkbox"]{width:22px;height:22px}
.btn{
  background:#4F46E5;color:white;border:none;width:100%;
  padding:16px;border-radius:12px;font-size:16px;
  margin-top:20px;cursor:pointer;
}
.btn:disabled{background:#ccc}
.tip{text-align:center;color:green;margin-top:16px;font-size:16px;display:none}
</style>
</head>
<body>
<div class="box">
  <h2>我的数字身份</h2>

  <div class="input-row">
    <input type="text" placeholder="请输入编号（如02）" id="stuId" maxlength="2" oninput="value=value.replace(/[^\d]/g,'')">
    <button onclick="bindId()">确定</button>
  </div>

  <div class="item"><input type="checkbox" id="a1" disabled><label>微信账号</label></div>
  <div class="item"><input type="checkbox" id="a2" disabled><label>QQ账号</label></div>
  <div class="item"><input type="checkbox" id="a3" disabled><label>短视频账号</label></div>
  <div class="item"><input type="checkbox" id="a4" disabled><label>学习平台账号</label></div>
  <div class="item"><input type="checkbox" id="a5" disabled><label>音乐/听书账号</label></div>
  <div class="item"><input type="checkbox" id="a6" disabled><label>游戏账号</label></div>
  <div class="item"><input type="checkbox" id="a7" disabled><label>绘画/编程账号</label></div>

  <button class="btn" id="btn" disabled onclick="submit()">提交</button>
  <div class="tip" id="msg">提交成功！</div>
</div>

<script>
const STORAGE = "identity_stats";
const SUBMIT_PREFIX = "submitted_id_";
let currentId = null;
let currentNum = null;

// 格式化编号为两位数
function formatTwoDigits(num) {
  return num.toString().padStart(2, '0');
}

// 检查是否已提交
function isSubmitted(idStr) {
  return localStorage.getItem(SUBMIT_PREFIX + idStr) === "true";
}

// 输入编号确定
function bindId() {
  let val = document.getElementById("stuId").value.trim();
  if (!val) {
    alert("请输入编号！");
    return;
  }

  // 转数字并格式化为两位
  let num = parseInt(val, 10);
  if (isNaN(num) || num < 1 || num > 99) {
    alert("请输入有效编号（01~99）");
    return;
  }

  let idStr = formatTwoDigits(num);
  if (isSubmitted(idStr)) {
    alert("该编号已提交，不能重复提交！");
    return;
  }

  currentId = idStr;
  currentNum = num;

  // 解锁
  document.querySelectorAll("input[type='checkbox']").forEach(cb => {
    cb.disabled = false;
  });
  document.getElementById("btn").disabled = false;
  document.getElementById("stuId").disabled = true;
  document.querySelector(".input-row button").disabled = true;
}

// 分组
function getGroup(num) {
  return (num - 1) % 4; // 0=1组,1=2组,2=3组,3=4组
}

// 提交
function submit() {
  if (!currentId || currentNum === null) return;

  let btn = document.getElementById("btn");
  btn.disabled = true;
  btn.innerText = "提交中...";

  let data = JSON.parse(localStorage.getItem(STORAGE)) || {
    wx: [0,0,0,0],
    qq: [0,0,0,0],
    sp: [0,0,0,0],
    study: [0,0,0,0],
    music: [0,0,0,0],
    game: [0,0,0,0],
    art: [0,0,0,0],
    totalStu: 0
  };

  let g = getGroup(currentNum);

  if (a1.checked) data.wx[g]++;
  if (a2.checked) data.qq[g]++;
  if (a3.checked) data.sp[g]++;
  if (a4.checked) data.study[g]++;
  if (a5.checked) data.music[g]++;
  if (a6.checked) data.game[g]++;
  if (a7.checked) data.art[g]++;

  data.totalStu++;

  localStorage.setItem(STORAGE, JSON.stringify(data));
  localStorage.setItem(SUBMIT_PREFIX + currentId, "true");

  document.getElementById("msg").style.display = "block";
  btn.innerText = "已提交";
}
</script>
</body>
</html>
