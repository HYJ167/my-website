<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的数字身份</title>
<style>
body{background:#f5f7fa;padding:30px;font-family:微软雅黑}
.box{max-width:420px;margin:0 auto;background:#fff;padding:25px;border-radius:12px}
.title{text-align:center;color:#2d8cf0}
.item{margin:16px 0;font-size:16px}
button{background:#2d8cf0;color:white;border:none;padding:12px;width:100%;border-radius:8px;font-size:16px}
.ok{color:green;text-align:center;margin-top:12px;font-weight:bold;display:none}
</style>
</head>
<body>
<div class="box">
  <h2 class="title">我的数字身份</h2>
  <div class="item"><input type="checkbox" id="qq"> QQ</div>
  <div class="item"><input type="checkbox" id="wechat"> 微信</div>
  <div class="item"><input type="checkbox" id="game"> 游戏账号</div>
  <div class="item"><input type="checkbox" id="study"> 学习平台</div>
  <div class="item"><input type="checkbox" id="douyin"> 抖音</div>
  <button onclick="submit()">提交我的身份</button>
  <div class="ok" id="tip">提交成功！</div>
</div>

<script>
const API_KEY = "$2a$10$.B7BgbCtQWdTjV4cT0EnoeWEp5QcavXW9y0nmP3rXnGvndnBP9C6u";
const BIN_ID = "69d906ea5a7d7921ae2823a0";

async function submit() {
  // 立刻显示成功，绝不卡顿
  tip.style.display = "block";
  setTimeout(() => tip.style.display = "none", 1500);

  // 读取勾选
  let qq = document.getElementById("qq").checked ? 1 : 0;
  let wechat = document.getElementById("wechat").checked ? 1 : 0;
  let game = document.getElementById("game").checked ? 1 : 0;
  let study = document.getElementById("study").checked ? 1 : 0;
  let douyin = document.getElementById("douyin").checked ? 1 : 0;

  // 清空勾选
  document.querySelectorAll("input").forEach(i => i.checked = false);

  // 后台提交，不影响界面
  fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
    headers: { "X-Master-Key": API_KEY }
  }).then(res => res.json()).then(data => {
    let old = data.record;
    let newData = {
      qq: old.qq + qq,
      wechat: old.wechat + wechat,
      game: old.game + game,
      study: old.study + study,
      douyin: old.douyin + douyin,
      totalStudent: old.totalStudent + 1
    };
    fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": API_KEY
      },
      body: JSON.stringify(newData)
    });
  });
}
</script>
</body>
</html>
