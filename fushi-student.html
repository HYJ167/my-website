<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的数字身份</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",Arial}
body{background:#f7f9fc;padding:40px 20px;}
.box{
    max-width:600px;
    margin:0 auto;
    background:#fff;
    padding:40px;
    border-radius:16px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}
.title{
    text-align:center;
    color:#4F46E5;
    margin-bottom:30px;
    font-size:28px;
}
.item{
    margin:22px 0;
    display:flex;
    align-items:center;
    gap:14px;
    font-size:20px;
}
input[type="checkbox"]{
    width:26px;
    height:26px;
    accent-color:#4F46E5;
}
.btn{
    background:#4F46E5;
    color:#fff;
    border:none;
    padding:18px;
    border-radius:10px;
    font-size:20px;
    cursor:pointer;
    width:100%;
    margin-top:25px;
    transition: all 0.2s;
}
.btn:disabled{
    background:#999;
    cursor:not-allowed;
}
.tip{
    text-align:center;
    color:#10B981;
    font-weight:bold;
    font-size:20px;
    margin-top:18px;
    display:none;
}
.error-tip{
    text-align:center;
    color:#EF4444;
    font-weight:bold;
    font-size:18px;
    margin-top:15px;
    display:none;
}
</style>
</head>
<body>
<div class="box">
    <h2 class="title">我的数字身份</h2>
    <div class="item">
        <input type="checkbox" id="qq">
        <label>QQ</label>
    </div>
    <div class="item">
        <input type="checkbox" id="wechat">
        <label>微信</label>
    </div>
    <div class="item">
        <input type="checkbox" id="game">
        <label>游戏账号</label>
    </div>
    <div class="item">
        <input type="checkbox" id="study">
        <label>学习平台</label>
    </div>
    <div class="item">
        <input type="checkbox" id="douyin">
        <label>抖音</label>
    </div>
    <button class="btn" id="submitBtn" onclick="submitData()">提交我的身份</button>
    <div class="tip" id="msg">提交成功！</div>
    <div class="error-tip" id="errMsg">提交失败，请稍后重试</div>
</div>

<script>
// 🔴 这里必须填你自己的正确密钥！
const API_KEY = "$2a$10$.B7BgbCtQWdTjV4cT0EnoeWEp5QcavXW9y0nmP3rXnGvndnBP9C6u";
const BIN_ID = "69d906ea5a7d7921ae2823a0";
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

// 防重复提交标记
let isSubmitting = false;

async function submitData(){
    const btn = document.getElementById("submitBtn");
    const msg = document.getElementById("msg");
    const errMsg = document.getElementById("errMsg");

    // 🔥 双重防重复：状态锁+按钮禁用
    if(isSubmitting || btn.disabled) return;
    isSubmitting = true;
    btn.disabled = true;
    btn.innerText = "提交中...";
    msg.style.display = "none";
    errMsg.style.display = "none";

    // 读取勾选状态
    const qq = document.getElementById("qq").checked ? 1 : 0;
    const wechat = document.getElementById("wechat").checked ? 1 : 0;
    const game = document.getElementById("game").checked ? 1 : 0;
    const study = document.getElementById("study").checked ? 1 : 0;
    const douyin = document.getElementById("douyin").checked ? 1 : 0;

    try{
        // 1. 先获取最新数据（强制不缓存，解决跨域/缓存问题）
        const getRes = await fetch(`${API_URL}/latest?ts=${Date.now()}`, {
            method: "GET",
            headers: {
                "X-Master-Key": API_KEY,
                "Cache-Control": "no-cache, no-store, must-revalidate",
                "Pragma": "no-cache"
            },
            mode: "cors" // 明确指定跨域模式
        });

        if(!getRes.ok) throw new Error(`获取数据失败: ${getRes.status}`);
        const getData = await getRes.json();
        const oldData = getData.record;

        // 2. 计算新数据
        const newData = {
            qq: oldData.qq + qq,
            wechat: oldData.wechat + wechat,
            game: oldData.game + game,
            study: oldData.study + study,
            douyin: oldData.douyin + douyin,
            totalStudent: oldData.totalStudent + 1
        };

        // 3. 提交新数据（同样强制不缓存）
        const putRes = await fetch(API_URL, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "X-Master-Key": API_KEY,
                "Cache-Control": "no-cache, no-store, must-revalidate",
                "Pragma": "no-cache"
            },
            mode: "cors",
            body: JSON.stringify(newData)
        });

        if(!putRes.ok) throw new Error(`提交数据失败: ${putRes.status}`);

        // 4. 提交成功
        msg.style.display = "block";
        setTimeout(() => {
            msg.style.display = "none";
            // 提交成功后保持按钮禁用，彻底防止重复提交
            btn.innerText = "已提交";
        }, 2000);

    } catch (error) {
        console.error("提交错误详情:", error);
        // 显示错误提示，恢复按钮
        errMsg.style.display = "block";
        btn.disabled = false;
        btn.innerText = "提交我的身份";
        isSubmitting = false;
    }
}
</script>
</body>
</html>
