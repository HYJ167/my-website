<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学生提交</title>
<style>
body{background:#f7f9fc;font-family:Microsoft YaHei;padding:20px}
.box{max-width:480px;margin:0 auto;background:white;padding:24px;border-radius:16px}
h2{text-align:center;color:#4E73ED}
.item{margin:12px 0;display:flex;align-items:center;gap:8px}
input[type="checkbox"]{width:20px;height:20px}
#seat{padding:8px;width:80px}
.submit{width:100%;padding:14px;background:#27A866;color:white;border:none;border-radius:12px;margin-top:20px}
</style>
</head>
<body>
<div class="box">
  <h2>我的数字身份</h2>
  <div style="text-align:center;margin:16px 0">
    座位号：<input type="number" id="seat" min="1" max="50" value="1">
  </div>
  <div class="item"><input type="checkbox" id="c1"><label>社交账号</label></div>
  <div class="item"><input type="checkbox" id="c2"><label>购物账号</label></div>
  <div class="item"><input type="checkbox" id="c3"><label>短视频账号</label></div>
  <div class="item"><input type="checkbox" id="c4"><label>音乐账号</label></div>
  <div class="item"><input type="checkbox" id="c5"><label>游戏账号</label></div>
  <div class="item"><input type="checkbox" id="c6"><label>学习类账号</label></div>
  <button class="submit" onclick="submit()">提交</button>
</div>

<script>
const BIN_ID = "69d8a874856a6821891a601b";
const API_KEY = "$2a$10$.B7BgbCtQWdTjV4cT0EnoeWEp5QcavX9y0nmP3rXnGvndnBP9C6u";

async function submit(){
  let seat = parseInt(document.getElementById('seat').value);
  let g = (seat-1)%4;
  let ck = [c1.checked,c2.checked,c3.checked,c4.checked,c5.checked,c6.checked];

  // 强制等上一次完成，防止并发覆盖
  let res = await fetch("https://api.jsonbin.io/v3/b/"+BIN_ID+"/latest", {
    headers: { "X-Master-Key": API_KEY }
  });
  let data = (await res.json()).record || {
    wx:[0,0,0,0],qq:[0,0,0,0],sp:[0,0,0,0],music:[0,0,0,0],game:[0,0,0,0],art:[0,0,0,0],totalStu:0
  };

  if(ck[0])data.wx[g]++;
  if(ck[1])data.qq[g]++;
  if(ck[2])data.sp[g]++;
  if(ck[3])data.music[g]++;
  if(ck[4])data.game[g]++;
  if(ck[5])data.art[g]++;
  data.totalStu++;

  await fetch("https://api.jsonbin.io/v3/b/"+BIN_ID, {
    method:"PUT",
    headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
    body:JSON.stringify(data)
  });
  alert("提交成功！");
}
</script>
</body>
</html>
