<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>我的数字身份</title>
<style>
*{box-sizing:border-box;font-family:"Microsoft YaHei"}
body{background:#f7f9fc;padding:20px}
.box{max-width:500px;margin:0 auto;background:white;border-radius:16px;padding:30px}
h2{text-align:center;color:#4F46E5}
.item{margin:16px 0;display:flex;align-items:center;gap:12px;font-size:18px}
input{width:24px;height:24px}
.btn{background:#4F46E5;color:white;border:none;width:100%;padding:16px;border-radius:12px;font-size:18px;margin-top:20px}
.btn:disabled{background:#ccc}
.ok{text-align:center;color:green;font-size:17px;margin-top:16px;display:none}
</style>
</head>
<body>
<div class="box">
  <h2>我的数字身份</h2>
  <div class="item"><input type="checkbox" id="a1"><label>微信账号</label></div>
  <div class="item"><input type="checkbox" id="a2"><label>QQ账号</label></div>
  <div class="item"><input type="checkbox" id="a3"><label>短视频账号</label></div>
  <div class="item"><input type="checkbox" id="a4"><label>学习平台账号</label></div>
  <div class="item"><input type="checkbox" id="a5"><label>音乐/听书账号</label></div>
  <div class="item"><input type="checkbox" id="a6"><label>游戏账号</label></div>
  <div class="item"><input type="checkbox" id="a7"><label>绘画/编程账号</label></div>
  <button class="btn" id="btn" onclick="submit()">提交</button>
  <div class="ok" id="tip">提交成功！</div>
</div>

<script>
const STORAGE_KEY = "identity_stats";
let btn = document.getElementById("btn");
let tip = document.getElementById("tip");

if(localStorage.getItem("submitted_stu")){
  btn.disabled = true; btn.innerText = "已提交"; tip.style.display="block";
}

function submit(){
  if(btn.disabled) return;
  btn.disabled = true; btn.innerText = "提交中...";

  let v1 = a1.checked?1:0, v2=a2.checked?1:0, v3=a3.checked?1:0;
  let v4 = a4.checked?1:0, v5=a5.checked?1:0, v6=a6.checked?1:0, v7=a7.checked?1:0;

  let d = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {n1:0,n2:0,n3:0,n4:0,n5:0,n6:0,n7:0,count:0};
  d.n1+=v1;d.n2+=v2;d.n3+=v3;d.n4+=v4;d.n5+=v5;d.n6+=v6;d.n7+=v7;d.count+=1;

  localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
  localStorage.setItem("submitted_stu","true");

  tip.style.display="block"; btn.innerText="已提交";
}
</script>
</body>
</html>
