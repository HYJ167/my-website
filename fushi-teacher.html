<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>教师统计看板</title>
<style>
body{background:#f7f9fc;padding:30px;font-family:微软雅黑}
.wrap{max-width:900px;margin:0 auto}
.title{text-align:center;color:#2d8cf0}
.math{background:white;padding:15px;border-radius:10px;margin:20px 0}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:15px}
.card{background:white;padding:25px;text-align:center;border-radius:12px}
.num{font-size:30px;font-weight:bold;color:#2d8cf0;margin-top:10px}
.best{background:#fff2f2;padding:20px;border-radius:10px;text-align:center;font-size:22px;margin-top:20px}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="title">全班数字身份统计</h1>
  <div class="math">
    <strong>本课数学知识：</strong>分类计数、加法求和、数的大小比较、简单数据分析
  </div>
  <div class="grid">
    <div class="card">QQ<div class="num" id="qq">0</div></div>
    <div class="card">微信<div class="num" id="wechat">0</div></div>
    <div class="card">游戏账号<div class="num" id="game">0</div></div>
    <div class="card">学习平台<div class="num" id="study">0</div></div>
    <div class="card">抖音<div class="num" id="douyin">0</div></div>
  </div>
  <div class="best">🏆 最受欢迎：<span id="best">等待数据</span></div>
</div>

<script>
const API_KEY = "$2a$10$.B7BgbCtQWdTjV4cT0EnoeWEp5QcavXW9y0nmP3rXnGvndnBP9C6u";
const BIN_ID = "69d8a874856a601891a601b";

async function load() {
  let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
    headers: { "X-Master-Key": API_KEY }
  });
  let d = (await res.json()).record;

  document.getElementById("qq").innerText = d.qq;
  document.getElementById("wechat").innerText = d.wechat;
  document.getElementById("game").innerText = d.game;
  document.getElementById("study").innerText = d.study;
  document.getElementById("douyin").innerText = d.douyin;

  let max = Math.max(d.qq, d.wechat, d.game, d.study, d.douyin);
  let list = ["QQ","微信","游戏账号","学习平台","抖音"];
  let values = [d.qq,d.wechat,d.game,d.study,d.douyin];
  document.getElementById("best").innerText = list[values.indexOf(max)];
}

load();
setInterval(load, 2000);
</script>
</body>
</html>
