<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>数字身份统计 - 教师端</title>
<style>
*{box-sizing:border-box;font-family:"Microsoft YaHei";margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#f7f9fc;padding:8px;font-size:13px}
.main{max-width:940px;margin:0 auto}
h1{text-align:center;color:#4F46E5;font-size:18px;margin-bottom:4px}
.hint{text-align:center;color:#666;font-size:12px;margin-bottom:8px}

.card{background:white;border-radius:8px;padding:8px;margin-bottom:6px}
.title{font-weight:bold;font-size:13px;margin-bottom:6px;color:#4F46E5}

/* 小组布局 */
.group-row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr 60px;
  gap:4px;
  margin-bottom:6px;
  text-align:center;
  align-items:center;
}
.group-header{font-weight:bold;font-size:12px}
.item-box{
  background:#f4f7ff;
  padding:6px 2px;
  border-radius:4px;
  font-size:13px;
}
.sum-box{
  background:#e0eaff;
  padding:6px 2px;
  border-radius:4px;
  font-weight:bold;
  font-size:13px;
  color:#4F46E5;
}

/* 紧凑双列布局 */
.items-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

/* 汇总信息 */
.summary{
  display:flex;
  justify-content:center;
  gap:16px;
  background:#fff;
  border-radius:8px;
  padding:8px;
  margin-bottom:6px;
  font-size:13px;
}

/* 分析区：紧凑一行 */
.analysis{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  background:#fff;
  border-radius:8px;
  padding:8px;
  margin-bottom:6px;
  flex-wrap:nowrap;
}
.analysis-item{
  display:flex;
  align-items:center;
  gap:6px;
  white-space:nowrap;
}
.analysis-label{font-size:13px}
.blank{
  width:100px;
  border-bottom:1px solid #999;
  text-align:center;
  font-size:13px;
}
.small-btn{
  padding:3px 6px;
  background:#4F46E5;
  color:white;
  border:none;
  border-radius:4px;
  font-size:12px;
  cursor:pointer;
}

/* 清空按钮 */
.btn-clear{
  width:100%;
  padding:8px;
  background:#ef4444;
  color:white;
  border:none;
  border-radius:8px;
  font-size:14px;
  cursor:pointer;
}
</style>
</head>
<body>
<div class="main">
  <h1>全班数字身份统计</h1>
  <p class="hint">按4个小组统计 · 每项自动求和</p>

  <div class="items-grid">
    <!-- 微信 -->
    <div class="card">
      <div class="title">微信账号</div>
      <div class="group-row">
        <div class="group-header">1组</div>
        <div class="group-header">2组</div>
        <div class="group-header">3组</div>
        <div class="group-header">4组</div>
        <div class="group-header">合计</div>
      </div>
      <div class="group-row">
        <div class="item-box" id="wx1">0</div>
        <div class="item-box" id="wx2">0</div>
        <div class="item-box" id="wx3">0</div>
        <div class="item-box" id="wx4">0</div>
        <div class="sum-box" id="wxSum">0</div>
      </div>
    </div>

    <!-- QQ -->
    <div class="card">
      <div class="title">QQ账号</div>
      <div class="group-row">
        <div class="group-header">1组</div>
        <div class="group-header">2组</div>
        <div class="group-header">3组</div>
        <div class="group-header">4组</div>
        <div class="group-header">合计</div>
      </div>
      <div class="group-row">
        <div class="item-box" id="qq1">0</div>
        <div class="item-box" id="qq2">0</div>
        <div class="item-box" id="qq3">0</div>
        <div class="item-box" id="qq4">0</div>
        <div class="sum-box" id="qqSum">0</div>
      </div>
    </div>

    <!-- 短视频 -->
    <div class="card">
      <div class="title">短视频账号</div>
      <div class="group-row">
        <div class="group-header">1组</div>
        <div class="group-header">2组</div>
        <div class="group-header">3组</div>
        <div class="group-header">4组</div>
        <div class="group-header">合计</div>
      </div>
      <div class="group-row">
        <div class="item-box" id="sp1">0</div>
        <div class="item-box" id="sp2">0</div>
        <div class="item-box" id="sp3">0</div>
        <div class="item-box" id="sp4">0</div>
        <div class="sum-box" id="spSum">0</div>
      </div>
    </div>

    <!-- 学习平台 -->
    <div class="card">
      <div class="title">学习平台账号</div>
      <div class="group-row">
        <div class="group-header">1组</div>
        <div class="group-header">2组</div>
        <div class="group-header">3组</div>
        <div class="group-header">4组</div>
        <div class="group-header">合计</div>
      </div>
      <div class="group-row">
        <div class="item-box" id="study1">0</div>
        <div class="item-box" id="study2">0</div>
        <div class="item-box" id="study3">0</div>
        <div class="item-box" id="study4">0</div>
        <div class="sum-box" id="studySum">0</div>
      </div>
    </div>

    <!-- 音乐/听书 -->
    <div class="card">
      <div class="title">音乐/听书账号</div>
      <div class="group-row">
        <div class="group-header">1组</div>
        <div class="group-header">2组</div>
        <div class="group-header">3组</div>
        <div class="group-header">4组</div>
        <div class="group-header">合计</div>
      </div>
      <div class="group-row">
        <div class="item-box" id="music1">0</div>
        <div class="item-box" id="music2">0</div>
        <div class="item-box" id="music3">0</div>
        <div class="item-box" id="music4">0</div>
        <div class="sum-box" id="musicSum">0</div>
      </div>
    </div>

    <!-- 游戏 -->
    <div class="card">
      <div class="title">游戏账号</div>
      <div class="group-row">
        <div class="group-header">1组</div>
        <div class="group-header">2组</div>
        <div class="group-header">3组</div>
        <div class="group-header">4组</div>
        <div class="group-header">合计</div>
      </div>
      <div class="group-row">
        <div class="item-box" id="game1">0</div>
        <div class="item-box" id="game2">0</div>
        <div class="item-box" id="game3">0</div>
        <div class="item-box" id="game4">0</div>
        <div class="sum-box" id="gameSum">0</div>
      </div>
    </div>

    <!-- 绘画/编程 -->
    <div class="card" style="grid-column:1/3">
      <div class="title">绘画/编程账号</div>
      <div class="group-row">
        <div class="group-header">1组</div>
        <div class="group-header">2组</div>
        <div class="group-header">3组</div>
        <div class="group-header">4组</div>
        <div class="group-header">合计</div>
      </div>
      <div class="group-row">
        <div class="item-box" id="art1">0</div>
        <div class="item-box" id="art2">0</div>
        <div class="item-box" id="art3">0</div>
        <div class="item-box" id="art4">0</div>
        <div class="sum-box" id="artSum">0</div>
      </div>
    </div>
  </div>

  <div class="summary">
    <div>✅ 总人数：<b id="totalStu">0</b> 人</div>
    <div>✅ 身份总数：<b id="totalAll">0</b> 个</div>
  </div>

  <div class="analysis">
    <div class="analysis-item">
      <span class="analysis-label">人数最多：</span>
      <span class="blank" id="most"></span>
      <button class="small-btn" onclick="showMost()">显示</button>
    </div>
    <div class="analysis-item">
      <span class="analysis-label">人数最少：</span>
      <span class="blank" id="least"></span>
      <button class="small-btn" onclick="showLeast()">显示</button>
    </div>
    <div class="analysis-item">
      <span class="analysis-label">平均每人：</span>
      <span class="blank" id="avg"></span>
      <button class="small-btn" onclick="showAvg()">显示</button>
    </div>
  </div>

  <button class="btn-clear" onclick="clearAll()">清空所有数据（重新上课）</button>
</div>

<script>
let data = {
  wx:    [0,0,0,0],
  qq:    [0,0,0,0],
  sp:    [0,0,0,0],
  study: [0,0,0,0],
  music: [0,0,0,0],
  game:  [0,0,0,0],
  art:   [0,0,0,0],
  totalStu: 0
};

function sum(arr){return arr.reduce((a,b)=>a+b,0)}

function load(){
  function set(id,arr){
    document.getElementById(id+'1').innerText=arr[0]
    document.getElementById(id+'2').innerText=arr[1]
    document.getElementById(id+'3').innerText=arr[2]
    document.getElementById(id+'4').innerText=arr[3]
    document.getElementById(id+'Sum').innerText=sum(arr)
  }
  set('wx',data.wx)
  set('qq',data.qq)
  set('sp',data.sp)
  set('study',data.study)
  set('music',data.music)
  set('game',data.game)
  set('art',data.art)

  document.getElementById('totalStu').innerText=data.totalStu
  let all=sum(data.wx)+sum(data.qq)+sum(data.sp)+sum(data.study)+sum(data.music)+sum(data.game)+sum(data.art)
  document.getElementById('totalAll').innerText=all
}

function showMost(){
  let list=[
    {n:"微信",v:sum(data.wx)},{n:"QQ",v:sum(data.qq)},{n:"短视频",v:sum(data.sp)},
    {n:"学习平台",v:sum(data.study)},{n:"音乐/听书",v:sum(data.music)},{n:"游戏",v:sum(data.game)},{n:"绘画/编程",v:sum(data.art)}
  ]
  let max=Math.max(...list.map(i=>i.v))
  document.getElementById('most').innerText=list.find(i=>i.v==max)?.n||'无'
}

function showLeast(){
  let list=[
    {n:"微信",v:sum(data.wx)},{n:"QQ",v:sum(data.qq)},{n:"短视频",v:sum(data.sp)},
    {n:"学习平台",v:sum(data.study)},{n:"音乐/听书",v:sum(data.music)},{n:"游戏",v:sum(data.game)},{n:"绘画/编程",v:sum(data.art)}
  ]
  let min=Math.min(...list.map(i=>i.v))
  document.getElementById('least').innerText=list.find(i=>i.v==min)?.n||'无'
}

function showAvg(){
  let all=sum(data.wx)+sum(data.qq)+sum(data.sp)+sum(data.study)+sum(data.music)+sum(data.game)+sum(data.art)
  let avg=data.totalStu>0?(all/data.totalStu).toFixed(1):0
  document.getElementById('avg').innerText=avg
}

function clearAll(){
  if(!confirm("确定清空？"))return
  data={wx:[0,0,0,0],qq:[0,0,0,0],sp:[0,0,0,0],study:[0,0,0,0],music:[0,0,0,0],game:[0,0,0,0],art:[0,0,0,0],totalStu:0}
  document.getElementById('most').innerText=''
  document.getElementById('least').innerText=''
  document.getElementById('avg').innerText=''
  load()
}

load()
</script>
</body>
</html>
