<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全班数字身份统计</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",Arial}
body{background:#f7f9fc;padding:30px;}
.wrap{max-width:1000px;margin:0 auto;}
.main-title{text-align:center;color:#4F46E5;margin-bottom:8px;font-size:28px;}
.sub-title{text-align:center;color:#666;margin-bottom:25px;font-size:16px;}

/* 数学知识点模块 */
.math-box{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px;border-left:4px solid #4F46E5;}
.math-title{font-weight:bold;color:#4F46E5;font-size:20px;margin-bottom:15px;}
.math-points{display:flex;justify-content:space-around;flex-wrap:wrap;gap:12px;}
.point{background:#EEF2FF;padding:10px 18px;border-radius:8px;font-size:15px;color:#333;}

/* 统计展示模块 */
.count-box{background:#fff;padding:25px;border-radius:12px;margin-bottom:20px;}
.count-title{font-weight:bold;margin-bottom:20px;font-size:20px;}
.count-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:18px;text-align:center;}
.count-item{background:#f8f9fa;padding:20px;border-radius:10px;}
.count-item .name{font-size:18px;margin-bottom:10px;color:#333;}
.count-item .num{font-size:32px;font-weight:bold;color:#4F46E5;}

/* 数学分析结果 */
.result-box{background:#fff;padding:25px;border-radius:12px;margin-bottom:20px;}
.result-item{margin:12px 0;font-size:18px;line-height:1.8;color:#333;}
.result-item::before{content:"✅ ";color:#10B981;margin-right:8px;}
.best{background:#fff2f2;padding:18px;border-radius:10px;text-align:center;font-size:24px;font-weight:bold;color:#ff3000;margin-top:20px;}

/* 清空按钮 */
.btn-area{text-align:center;margin-top:20px;}
.btn-clear{background:#EF4444;color:white;border:none;padding:12px 25px;border-radius:8px;font-size:16px;cursor:pointer;}
.btn-clear:hover{background:#dc2626;}
</style>
</head>
<body>
<div class="wrap">
    <h1 class="main-title">全班数字身份统计</h1>
    <p class="sub-title">信息科技：认识数字身份 | 数学融合：三年级下册·前6周已学知识</p>

    <!-- 数学知识点模块 -->
    <div class="math-box">
        <div class="math-title">📘 本节课运用的已学数学知识</div>
        <div class="math-points">
            <span class="point">1.数的大小比较</span>
            <span class="point">2.分类计数求和</span>
            <span class="point">3.除数是一位数的除法</span>
            <span class="point">4.简单平均数计算</span>
            <span class="point">5.数据收集分析</span>
        </div>
    </div>

    <!-- 分类计数统计结果 -->
    <div class="count-box">
        <div class="count-title">📊 各类数字身份拥有人数统计</div>
        <div class="count-grid">
            <div class="count-item">
                <div class="name">QQ</div>
                <div class="num" id="qq">0</div>
            </div>
            <div class="count-item">
                <div class="name">微信</div>
                <div class="num" id="wechat">0</div>
            </div>
            <div class="count-item">
                <div class="name">游戏账号</div>
                <div class="num" id="game">0</div>
            </div>
            <div class="count-item">
                <div class="name">学习平台</div>
                <div class="num" id="study">0</div>
            </div>
            <div class="count-item">
                <div class="name">抖音</div>
                <div class="num" id="douyin">0</div>
            </div>
        </div>
    </div>

    <!-- 数学分析结论 -->
    <div class="result-box">
        <div class="result-item">人数最多的身份：<span id="max" style="font-weight:bold;color:#4F46E5;">等待数据</span></div>
        <div class="result-item">人数最少的身份：<span id="min" style="font-weight:bold;color:#4F46E5;">等待数据</span></div>
        <div class="result-item">全班参与统计人数：<span id="totalStu" style="font-weight:bold;">0</span> 人</div>
        <div class="result-item">身份总数量：<span id="totalNum" style="font-weight:bold;">0</span> 个</div>
        <div class="result-item">平均每人拥有身份数：<span id="avg" style="font-weight:bold;">0</span> 种（除法计算）</div>
        <div class="best">🏆 全班最受欢迎数字身份：<span id="best">等待统计</span></div>
    </div>

    <!-- 清空按钮 -->
    <div class="btn-area">
        <button class="btn-clear" onclick="clearData()">🗑️ 清空所有统计数据</button>
    </div>
</div>

<script>
const API_KEY = "$2a$10$.B7BgbCtQWdTjV4cT0EnoeWEp5QcavXW9y0nmP3rXnGvndnBP9C6u";
const BIN_ID = "69d8a874856a6821891a601b";

async function loadData(){
    try{
        let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{
            headers:{"X-Master-Key":API_KEY}
        });
        let data = await res.json();
        let d = data.record;

        // 渲染基础数据
        document.getElementById("qq").innerText = d.qq;
        document.getElementById("wechat").innerText = d.wechat;
        document.getElementById("game").innerText = d.game;
        document.getElementById("study").innerText = d.study;
        document.getElementById("douyin").innerText = d.douyin;
        document.getElementById("totalStu").innerText = d.totalStudent;

        // 1.求和：身份总数量（加法）
        let totalNum = d.qq + d.wechat + d.game + d.study + d.douyin;
        document.getElementById("totalNum").innerText = totalNum;

        // 2.除法求平均数（第二单元核心知识）
        let avg = d.totalStudent > 0 ? (totalNum / d.totalStudent).toFixed(1) : 0;
        document.getElementById("avg").innerText = avg;

        // 3.数的大小比较：找最多/最少
        let arr = [
            {name:"QQ",val:d.qq},
            {name:"微信",val:d.wechat},
            {name:"游戏账号",val:d.game},
            {name:"学习平台",val:d.study},
            {name:"抖音",val:d.douyin}
        ];
        let maxVal = Math.max(...arr.map(i=>i.val));
        let minVal = Math.min(...arr.map(i=>i.val));
        let maxItem = arr.find(i=>i.val===maxVal)?.name;
        let minItem = arr.find(i=>i.val===minVal)?.name;

        document.getElementById("max").innerText = maxItem || "等待数据";
        document.getElementById("min").innerText = minItem || "等待数据";
        document.getElementById("best").innerText = maxItem || "等待统计";
    }catch(e){
        console.error("加载失败", e);
    }
}

// 清空数据函数
async function clearData(){
    if(!confirm("确定要清空所有统计数据吗？此操作不可恢复！")) return;
    try{
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
            method:"PUT",
            headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
            body:JSON.stringify({
                qq:0,
                wechat:0,
                game:0,
                study:0,
                douyin:0,
                totalStudent:0
            })
        });
        alert("数据已清空！");
        loadData();
    }catch(e){
        alert("清空失败，请检查密钥");
    }
}

// 初始化加载 + 定时刷新
loadData();
setInterval(loadData, 2000);
</script>
</body>
</html>
