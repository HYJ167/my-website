<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>数字身份统计 - 教师端</title>
<style>
*{box-sizing:border-box;font-family:"Microsoft YaHei";margin:0;padding:0}
html,body{background:#f5f7fa;padding:20px;font-size:15px}
.main{max-width:1000px;margin:0 auto}
h1{text-align:center;color:#2f406e;margin-bottom:10px}
.hint{text-align:center;color:#777;margin-bottom:20px}

.btn-bar{display:flex;justify-content:center;gap:16px;margin-bottom:24px}
.btn-switch{padding:12px 24px;background:#4e73ed;color:white;border:none;border-radius:8px}
.btn-green{background:#27a866}

.single-area{display:none}
.single-area.show{display:block}
.table-card{background:white;border-radius:16px;padding:28px;margin:0 auto 20px;max-width:500px}
.table-title{font-weight:bold;font-size:18px;margin-bottom:16px;text-align:center}
.table{width:100%;border-collapse:collapse;border:2px solid #333;text-align:center}
.table th,.table td{border:1px solid #666;padding:10px}
.table th{background:#e9f0ff}

.btns{display:flex;justify-content:center;gap:12px;margin-bottom:20px}
.btn-page{padding:8px 16px;background:#4e73ed;color:white;border:none;border-radius:8px}

.composite-area{display:none}
.composite-area.show{display:block}
.items-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.card{background:white;border-radius:12px;padding:16px}
.title{font-weight:bold;margin-bottom:12px}
.group-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 70px;gap:6px;text-align:center}
.item-box{background:#f4f7ff;padding:8px;border-radius:4px}
.sum-box{background:#d7e3ff;padding:8px;border-radius:4px;font-weight:bold}

.summary{display:flex;justify-content:center;gap:24px;background:white;border-radius:12px;padding:16px;margin-bottom:16px}
.analysis{display:flex;justify-content:center;gap:20px;background:white;border-radius:12px;padding:16px}
.blank{width:140px;border-bottom:1px solid #999;text-align:center}
.small-btn{padding:6px 10px;background:#4e73ed;color:white;border:none;border-radius:4px}
.btn-clear{width:100%;padding:14px;background:#e53e3e;color:white;border:none;border-radius:12px;margin-top:16px}
</style>
</head>
<body>
<div class="main">
  <h1>数字身份统计</h1>
  <p class="hint">单式 ↔ 复式统计表</p>

  <div class="btn-bar">
    <button class="btn-switch" onclick="showSingle()">单式统计表</button>
    <button class="btn-switch btn-green" onclick="showComposite()">复式统计表</button>
  </div>

  <div class="single-area show" id="singleArea">
    <div class="table-card">
      <div class="table-title" id="currentTitle">社交账号</div>
      <table class="table">
        <tr><th>1组</th><th>2组</th><th>3组</th><th>4组</th><th>合计</th></tr>
        <tr><td id="c1">0</td><td id="c2">0</td><td id="c3">0</td><td id="c4">0</td><td id="cSum">0</td></tr>
      </table>
    </div>
    <div class="btns">
      <button class="btn-page" onclick="prev()">上一页</button>
      <button class="btn-page" onclick="next()">下一页</button>
    </div>
  </div>

  <div class="composite-area" id="compositeArea">
    <div class="items-grid">
      <div class="card"><div class="title">社交账号</div><div class="group-row"><div>1组</div><div>2组</div><div>3组</div><div>4组</div><div>合计</div></div><div class="group-row"><div class="item-box" id="wx1">0</div><div class="item-box" id="wx2">0</div><div class="item-box" id="wx3">0</div><div class="item-box" id="wx4">0</div><div class="sum-box" id="wxSum">0</div></div></div>
      <div class="card"><div class="title">购物账号</div><div class="group-row"><div>1组</div><div>2组</div><div>3组</div><div>4组</div><div>合计</div></div><div class="group-row"><div class="item-box" id="qq1">0</div><div class="item-box" id="qq2">0</div><div class="item-box" id="qq3">0</div><div class="item-box" id="qq4">0</div><div class="sum-box" id="qqSum">0</div></div></div>
      <div class="card"><div class="title">短视频账号</div><div class="group-row"><div>1组</div><div>2组</div><div>3组</div><div>4组</div><div>合计</div></div><div class="group-row"><div class="item-box" id="sp1">0</div><div class="item-box" id="sp2">0</div><div class="item-box" id="sp3">0</div><div class="item-box" id="sp4">0</div><div class="sum-box" id="spSum">0</div></div></div>
      <div class="card"><div class="title">音乐账号</div><div class="group-row"><div>1组</div><div>2组</div><div>3组</div><div>4组</div><div>合计</div></div><div class="group-row"><div class="item-box" id="music1">0</div><div class="item-box" id="music2">0</div><div class="item-box" id="music3">0</div><div class="item-box" id="music4">0</div><div class="sum-box" id="musicSum">0</div></div></div>
      <div class="card"><div class="title">游戏账号</div><div class="group-row"><div>1组</div><div>2组</div><div>3组</div><div>4组</div><div>合计</div></div><div class="group-row"><div class="item-box" id="game1">0</div><div class="item-box" id="game2">0</div><div class="item-box" id="game3">0</div><div class="item-box" id="game4">0</div><div class="sum-box" id="gameSum">0</div></div></div>
      <div class="card"><div class="title">学习类账号</div><div class="group-row"><div>1组</div><div>2组</div><div>3组</div><div>4组</div><div>合计</div></div><div class="group-row"><div class="item-box" id="art1">0</div><div class="item-box" id="art2">0</div><div class="item-box" id="art3">0</div><div class="item-box" id="art4">0</div><div class="sum-box" id="artSum">0</div></div></div>
    </div>
    <div class="summary">
      <div>总人数：<b id="totalStu">0</b></div>
      <div>总数：<b id="totalAll">0</b></div>
    </div>
    <div class="analysis">
      <div>最多：<span class="blank" id="most"></span></div>
      <div>最少：<span class="blank" id="least"></span></div>
    </div>
  </div>

  <button class="btn-clear" onclick="clearAll()">清空数据</button>
</div>

<script>
const BIN_ID = "69d8a874856a6821891a601b";
const API_KEY = "$2a$10$.B7BgbCtQWdTjV4cT0EnoeWEp5QcavX9y0nmP3rXnGvndnBP9C6u";

let data = null;
let titles = ["社交账号","购物账号","短视频账号","音乐账号","游戏账号","学习类账号"];
let keys = ["wx","qq","sp","music","game","art"];
let idx = 0;

function sum(arr){ return arr.reduce((a,b)=>a+b,0) }
function showSingle(){ singleArea.classList.add('show'); compositeArea.classList.remove('show') }
function showComposite(){ singleArea.classList.remove('show'); compositeArea.classList.add('show') }

function renderTable(){
  let arr = data[keys[idx]] || [0,0,0,0];
  currentTitle.innerText = titles[idx];
  c1.innerText=arr[0]; c2.innerText=arr[1]; c3.innerText=arr[2]; c4.innerText=arr[3]; cSum.innerText=sum(arr);
}
function prev(){ idx--; if(idx<0)idx=keys.length-1; renderTable() }
function next(){ idx++; if(idx>=keys.length)idx=0; renderTable() }

async function load(){
  try {
    let res = await fetch("https://api.jsonbin.io/v3/b/"+BIN_ID+"/latest", {
      headers: { "X-Master-Key": API_KEY }
    });
    data = (await res.json()).record || {
      wx:[0,0,0,0],qq:[0,0,0,0],sp:[0,0,0,0],music:[0,0,0,0],game:[0,0,0,0],art:[0,0,0,0],totalStu:0
    };
    renderTable();
    renderComposite();
  }catch(e){}
}

function renderComposite(){
  if(!data)return;
  wx1.innerText=data.wx[0];wx2.innerText=data.wx[1];wx3.innerText=data.wx[2];wx4.innerText=data.wx[3];wxSum.innerText=sum(data.wx);
  qq1.innerText=data.qq[0];qq2.innerText=data.qq[1];qq3.innerText=data.qq[2];qq4.innerText=data.qq[3];qqSum.innerText=sum(data.qq);
  sp1.innerText=data.sp[0];sp2.innerText=data.sp[1];sp3.innerText=data.sp[2];sp4.innerText=data.sp[3];spSum.innerText=sum(data.sp);
  music1.innerText=data.music[0];music2.innerText=data.music[1];music3.innerText=data.music[2];music4.innerText=data.music[3];musicSum.innerText=sum(data.music);
  game1.innerText=data.game[0];game2.innerText=data.game[1];game3.innerText=data.game[2];game4.innerText=data.game[3];gameSum.innerText=sum(data.game);
  art1.innerText=data.art[0];art2.innerText=data.art[1];art3.innerText=data.art[2];art4.innerText=data.art[3];artSum.innerText=sum(data.art);
  totalStu.innerText=data.totalStu;
  totalAll.innerText=sum(data.wx)+sum(data.qq)+sum(data.sp)+sum(data.music)+sum(data.game)+sum(data.art);
}

async function clearAll(){
  if(!confirm("确定清空？"))return;
  let empty = {wx:[0,0,0,0],qq:[0,0,0,0],sp:[0,0,0,0],music:[0,0,0,0],game:[0,0,0,0],art:[0,0,0,0],totalStu:0};
  await fetch("https://api.jsonbin.io/v3/b/"+BIN_ID, {
    method:"PUT", headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
    body:JSON.stringify(empty)
  });
  load();
}

load();
setInterval(load, 2000);
</script>
</body>
</html>
