<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>数字身份统计 - 教师端</title>
<style>
*{box-sizing:border-box;font-family:"Microsoft YaHei"}
body{background:#f7f9fc;padding:20px}
.main{max-width:900px;margin:0 auto}
h1{text-align:center;color:#4F46E5}
.hint{text-align:center;color:#666;margin-bottom:30px}
.card{background:white;border-radius:16px;padding:24px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;text-align:center}
.item{background:#f4f7ff;padding:16px;border-radius:12px}
.name{font-size:15px;margin-bottom:8px}
.num{font-size:28px;font-weight:bold;color:#4F46E5}
.analysis p{font-size:18px;line-height:2;margin:8px 0}
.best{background:#fff1f3;color:#e11d48;padding:12px;border-radius:12px;text-align:center;font-size:20px;font-weight:bold}
.btn{background:#ef4444;color:white;border:none;padding:14px 24px;border-radius:12px;width:100%;font-size:18px;cursor:pointer}
</style>
</head>
<body>
<div class="main">
  <h1>全班数字身份统计</h1>
  <p class="hint">信息科技+数学融合课堂</p>

  <div class="card">
    <div class="grid">
      <div class="item"><div class="name">微信账号</div><div class="num" id="n1">0</div></div>
      <div class="item"><div class="name">QQ账号</div><div class="num" id="n2">0</div></div>
      <div class="item"><div class="name">短视频账号</div><div class="num" id="n3">0</div></div>
      <div class="item"><div class="name">学习平台账号</div><div class="num" id="n4">0</div></div>
      <div class="item"><div class="name">音乐/听书账号</div><div class="num" id="n5">0</div></div>
      <div class="item"><div class="name">游戏账号</div><div class="num" id="n6">0</div></div>
      <div class="item"><div class="name">绘画/编程账号</div><div class="num" id="n7">0</div></div>
    </div>
  </div>

  <div class="card analysis">
    <p>✅ 参与统计总人数：<span id="total">0</span> 人</p>
    <p>✅ 身份总数（加法）：<span id="sum">0</span> 个</p>
    <p>✅ 平均每人拥有身份数：<span id="avg">0</span> 种</p>
    <p>✅ 人数最多的身份：<span id="most" style="font-weight:bold;color:green">—</span></p>
    <p>✅ 人数最少的身份：<span id="least" style="font-weight:bold;color:red">—</span></p>
  </div>

  <div class="best">🏆 全班最受欢迎的数字身份：<span id="best">—</span></div>

  <div style="margin-top:24px">
    <button class="btn" onclick="clearData()">清空数据（重新上课）</button>
  </div>
</div>

<script>
const STORAGE_KEY = "identity_stats";

function getData(){
  return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
    n1:0,n2:0,n3:0,n4:0,n5:0,n6:0,n7:0,count:0
  };
}

function load(){
  let d = getData();
  document.getElementById("n1").innerText=d.n1;
  document.getElementById("n2").innerText=d.n2;
  document.getElementById("n3").innerText=d.n3;
  document.getElementById("n4").innerText=d.n4;
  document.getElementById("n5").innerText=d.n5;
  document.getElementById("n6").innerText=d.n6;
  document.getElementById("n7").innerText=d.n7;
  document.getElementById("total").innerText=d.count;

  let total = d.n1+d.n2+d.n3+d.n4+d.n5+d.n6+d.n7;
  document.getElementById("sum").innerText=total;

  let avg = d.count>0 ? (total/d.count).toFixed(1) : 0;
  document.getElementById("avg").innerText=avg;

  let arr = [
    {name:"微信账号",val:d.n1},
    {name:"QQ账号",val:d.n2},
    {name:"短视频账号",val:d.n3},
    {name:"学习平台账号",val:d.n4},
    {name:"音乐/听书账号",val:d.n5},
    {name:"游戏账号",val:d.n6},
    {name:"绘画/编程账号",val:d.n7}
  ];

  let max = Math.max(...arr.map(o=>o.val));
  let min = Math.min(...arr.map(o=>o.val));
  let most = arr.find(o=>o.val===max)?.name||"无";
  let least = arr.find(o=>o.val===min)?.name||"无";

  document.getElementById("most").innerText=most;
  document.getElementById("least").innerText=least;
  document.getElementById("best").innerText=most;
}

function clearData(){
  if(!confirm("确定清空所有数据吗？")) return;
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    n1:0,n2:0,n3:0,n4:0,n5:0,n6:0,n7:0,count:0
  }));
  localStorage.removeItem("submitted_stu");
  load();
}

load();
setInterval(load, 2000);
</script>
</body>
</html>
