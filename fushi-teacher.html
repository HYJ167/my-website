<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>数字身份统计 - 单式/复式切换</title>
<style>
*{box-sizing:border-box;font-family:"Microsoft YaHei";margin:0;padding:0}
html,body{height:100%;background:#f0f4f9;font-size:13px}
.main{max-width:960px;margin:0 auto;padding:16px 12px}
h1{text-align:center;color:#374151;font-size:22px;margin-bottom:8px;font-weight:600}
.hint{text-align:center;color:#6B7280;font-size:13px;margin-bottom:18px}

/* 切换按钮 */
.switch-bar {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 20px;
}
.switch-btn {
    padding: 9px 20px;
    background: #6366F1;
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.25s ease;
    box-shadow: 0 2px 6px rgba(99,102,241,0.2);
}
.switch-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(99,102,241,0.25);
}
.switch-btn.active {
    background: #10B981;
    box-shadow: 0 3px 8px rgba(16,185,129,0.25);
}

/* 单式统计表 加宽拉满 贴近右侧按钮 */
.single-view {
    display: none;
    max-width: 780px;
    margin: 0 auto;
}
.single-card {
    background: #fff;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
}
/* 表格强行占满剩余宽度 */
.single-table {
    flex: 1;
    margin-right: 10px;
}
.single-table .title {
    font-weight: 600;
    font-size: 18px;
    margin-bottom: 15px;
    color: #4F46E5;
}
.single-table table {
    width: 100%;
    border-collapse: collapse;
    text-align: center;
    border-radius: 10px;
    overflow: hidden;
}
.single-table th, .single-table td {
    border: 1px solid #E5E7EB;
    padding: 14px 10px;
    font-size: 15px;
}
.single-table th {
    background: #EEF2FF;
    font-weight: 500;
}
/* 右侧按钮区域固定宽度，表格自动贴紧 */
.single-nav {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 130px;
    flex-shrink: 0;
}
.single-nav button {
    padding: 10px 18px;
    background: #6366F1;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
    font-size: 14px;
}
.single-nav button:hover {
    opacity: 0.9;
}
.generate-btn {
    background: #10B981 !important;
}

/* 复式统计表美化 + 字体加大加粗 */
.composite-view {
    display: block;
}
.real-table {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    margin-bottom: 16px;
}
.real-table table {
    width: 100%;
    border-collapse: collapse;
    text-align: center;
    border-radius: 12px;
    overflow: hidden;
}
.real-table th, .real-table td {
    border: 1px solid #E5E7EB;
    padding: 14px 8px;
    vertical-align: middle;
    font-size: 15px;
    font-weight: bold;
}
.real-table .title-row th {
    background: #6366F1;
    color: #fff;
    font-weight: bold;
    font-size: 16px;
}
.real-table tr:nth-child(even) {
    background: #F9FAFB;
}
.real-table th:first-child {
    background: #EEF2FF;
    color: #374151;
    font-weight: bold;
    font-size: 15px;
}
.real-table .total {
    background: #D1FAE5;
    color: #065F46;
    font-weight: bold;
    font-size: 16px;
}

/* 统计汇总、分析区域美化 */
.summary{
  display:flex;
  justify-content:center;
  gap:30px;
  background:#fff;
  border-radius:14px;
  padding:14px 20px;
  margin-bottom:12px;
  font-size:15px;
  font-weight:bold;
  box-shadow:0 4px 16px rgba(0,0,0,0.05);
}
.analysis{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:20px;
  background:#fff;
  border-radius:14px;
  padding:18px;
  margin-bottom:12px;
  flex-wrap:wrap;
  box-shadow:0 4px 16px rgba(0,0,0,0.05);
}
.analysis-item{
  display:flex;
  align-items:flex-start;
  gap:10px;
}
.analysis-label{
  font-size:15px;
  font-weight:bold;
  white-space:nowrap;
  color:#374151;
}
.blank{
  width:240px;
  min-height:28px;
  border-bottom:1px solid #9CA3AF;
  text-align:center;
  font-size:15px;
  font-weight:bold;
  padding:4px 6px;
  line-height:1.5;
  background:#F9FAFB;
  border-radius:4px;
}
.small-btn{
  padding:6px 12px;
  background:#6366F1;
  color:white;
  border:none;
  border-radius:6px;
  font-size:12px;
  cursor:pointer;
  transition:0.2s;
  white-space:nowrap;
}
.small-btn:hover {
    opacity: 0.9;
}
.btn-clear{
  width:100%;
  padding:12px;
  background:#EF4444;
  color:white;
  border:none;
  border-radius:12px;
  font-size:14px;
  cursor:pointer;
  margin-top:4px;
  transition:0.2s;
  box-shadow:0 4px 12px rgba(239,68,68,0.15);
}
.btn-clear:hover {
    opacity: 0.92;
}
.btn-clear:disabled{
  background:#FCA5A5;
  cursor:not-allowed;
  box-shadow:none;
}
</style>
</head>
<body>
<div class="main">
  <h1>全班数字身份统计</h1>
  <p class="hint">JSONBin 云端实时同步 · 单式/复式一键切换</p>

  <div class="switch-bar">
    <button class="switch-btn" onclick="showSingleView()">单式统计表</button>
    <button class="switch-btn active" onclick="showCompositeView()">复式统计表</button>
  </div>

  <div class="single-view" id="singleView">
    <div class="single-card">
      <div class="single-table">
        <div class="title" id="singleTitle">社交账号（微信、QQ）</div>
        <table>
          <tr>
            <th>1组</th><th>2组</th><th>3组</th><th>4组</th><th>合计</th>
          </tr>
          <tr>
            <td id="s1">0</td><td id="s2">0</td><td id="s3">0</td><td id="s4">0</td><td id="sSum">0</td>
          </tr>
        </table>
      </div>
      <div class="single-nav">
        <button onclick="prevSingle()">上一页</button>
        <button onclick="nextSingle()">下一页</button>
        <button class="generate-btn" onclick="showCompositeView()">生成复式统计表</button>
      </div>
    </div>
  </div>

  <div class="composite-view" id="compositeView">
    <div class="real-table">
      <table>
        <tr class="title-row">
          <th>身份类型</th>
          <th>1组</th>
          <th>2组</th>
          <th>3组</th>
          <th>4组</th>
          <th>合计</th>
        </tr>
        <tr>
          <th>社交账号</th>
          <td id="wx1">0</td>
          <td id="wx2">0</td>
          <td id="wx3">0</td>
          <td id="wx4">0</td>
          <td id="wxSum" class="total">0</td>
        </tr>
        <tr>
          <th>购物账号</th>
          <td id="qq1">0</td>
          <td id="qq2">0</td>
          <td id="qq3">0</td>
          <td id="qq4">0</td>
          <td id="qqSum" class="total">0</td>
        </tr>
        <tr>
          <th>短视频账号</th>
          <td id="sp1">0</td>
          <td id="sp2">0</td>
          <td id="sp3">0</td>
          <td id="sp4">0</td>
          <td id="spSum" class="total">0</td>
        </tr>
        <tr>
          <th>音乐/听书账号</th>
          <td id="music1">0</td>
          <td id="music2">0</td>
          <td id="music3">0</td>
          <td id="music4">0</td>
          <td id="musicSum" class="total">0</td>
        </tr>
        <tr>
          <th>游戏账号</th>
          <td id="game1">0</td>
          <td id="game2">0</td>
          <td id="game3">0</td>
          <td id="game4">0</td>
          <td id="gameSum" class="total">0</td>
        </tr>
        <tr>
          <th>学习类账号</th>
          <td id="art1">0</td>
          <td id="art2">0</td>
          <td id="art3">0</td>
          <td id="art4">0</td>
          <td id="artSum" class="total">0</td>
        </tr>
      </table>
    </div>

    <div class="summary">
      <div>✅ 总人数：<b id="totalStu">0</b> 人</div>
      <div>✅ 身份总数：<b id="totalAll">0</b> 个</div>
    </div>

    <div class="analysis">
      <div class="analysis-item">
        <span class="analysis-label">人数最多的身份：</span>
        <span class="blank" id="most"></span>
        <button class="small-btn" onclick="showMost()">显示</button>
      </div>
      <div class="analysis-item">
        <span class="analysis-label">人数最少的身份：</span>
        <span class="blank" id="least"></span>
        <button class="small-btn" onclick="showLeast()">显示</button>
      </div>
    </div>

    <button class="btn-clear" id="clearBtn" onclick="clearAll()">清空所有数据（重新上课）</button>
  </div>
</div>

<script>
const BIN_ID = "69d8a874856a6821891a601b";
const API_KEY = "$2a$10$.B7BgbCtQWdTjV4cT0EnoeWEp5QcavXW9y0nmP3rXnGvndnBP9C6u";

let currentSingleIndex = 0;
const singleTitles = [
  "社交账号（微信、QQ）",
  "购物账号（淘宝、拼多多）",
  "短视频账号（抖音、B站、快手等）",
  "音乐/听书账号（网易云、喜马拉雅等）",
  "游戏账号（王者荣耀、迷你世界等）",
  "学习类账号（作业帮、一起学等）"
];
const singleKeys = ["wx", "qq", "sp", "music", "game", "art"];

function sum(arr) { return arr.reduce((a,b)=>a+b,0); }

function showSingleView() {
  document.getElementById('singleView').style.display = 'block';
  document.getElementById('compositeView').style.display = 'none';
  document.querySelectorAll('.switch-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector('.switch-btn[onclick="showSingleView()"]').classList.add('active');
  renderSingleTable();
}

function showCompositeView() {
  document.getElementById('singleView').style.display = 'none';
  document.getElementById('compositeView').style.display = 'block';
  document.querySelectorAll('.switch-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector('.switch-btn[onclick="showCompositeView()"]').classList.add('active');
}

function renderSingleTable() {
  const data = window.currentData || {
    wx:[0,0,0,0],qq:[0,0,0,0],sp:[0,0,0,0],music:[0,0,0,0],game:[0,0,0,0],art:[0,0,0,0],totalStu:0
  };
  
  const key = singleKeys[currentSingleIndex];
  const values = data[key] || [0,0,0,0];
  
  document.getElementById('singleTitle').innerText = singleTitles[currentSingleIndex];
  document.getElementById('s1').innerText = values[0];
  document.getElementById('s2').innerText = values[1];
  document.getElementById('s3').innerText = values[2];
  document.getElementById('s4').innerText = values[3];
  document.getElementById('sSum').innerText = sum(values);
}

function prevSingle() {
  currentSingleIndex = (currentSingleIndex - 1 + singleKeys.length) % singleKeys.length;
  renderSingleTable();
}

function nextSingle() {
  currentSingleIndex = (currentSingleIndex + 1) % singleKeys.length;
  renderSingleTable();
}

async function load() {
  try {
    let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
      headers: { "X-Master-Key": API_KEY }
    });
    let d = (await res.json()).record;
    if (!d) return;
    
    window.currentData = d;

    document.getElementById('wx1').innerText=d.wx[0];document.getElementById('wx2').innerText=d.wx[1];document.getElementById('wx3').innerText=d.wx[2];document.getElementById('wx4').innerText=d.wx[3];document.getElementById('wxSum').innerText=sum(d.wx);
    document.getElementById('qq1').innerText=d.qq[0];document.getElementById('qq2').innerText=d.qq[1];document.getElementById('qq3').innerText=d.qq[2];document.getElementById('qq4').innerText=d.qq[3];document.getElementById('qqSum').innerText=sum(d.qq);
    document.getElementById('sp1').innerText=d.sp[0];document.getElementById('sp2').innerText=d.sp[1];document.getElementById('sp3').innerText=d.sp[2];document.getElementById('sp4').innerText=d.sp[3];document.getElementById('spSum').innerText=sum(d.sp);
    document.getElementById('music1').innerText=d.music[0];document.getElementById('music2').innerText=d.music[1];document.getElementById('music3').innerText=d.music[2];document.getElementById('music4').innerText=d.music[3];document.getElementById('musicSum').innerText=sum(d.music);
    document.getElementById('game1').innerText=d.game[0];document.getElementById('game2').innerText=d.game[1];document.getElementById('game3').innerText=d.game[2];document.getElementById('game4').innerText=d.game[3];document.getElementById('gameSum').innerText=sum(d.game);
    document.getElementById('art1').innerText=d.art[0];document.getElementById('art2').innerText=d.art[1];document.getElementById('art3').innerText=d.art[2];document.getElementById('art4').innerText=d.art[3];document.getElementById('artSum').innerText=sum(d.art);

    document.getElementById('totalStu').innerText=d.totalStu;
    let all = sum(d.wx)+sum(d.qq)+sum(d.sp)+sum(d.music)+sum(d.game)+sum(d.art);
    document.getElementById('totalAll').innerText=all;

    if (document.getElementById('singleView').style.display === 'block') {
      renderSingleTable();
    }

  }catch(e){console.log(e)}
}

function showMost(){
  let d = window.currentData || {};
  let list=[
    {n:"社交账号",v:sum(d.wx||[0])},
    {n:"购物账号",v:sum(d.qq||[0])},
    {n:"短视频账号",v:sum(d.sp||[0])},
    {n:"音乐/听书账号",v:sum(d.music||[0])},
    {n:"游戏账号",v:sum(d.game||[0])},
    {n:"学习类账号",v:sum(d.art||[0])}
  ];
  let maxVal = Math.max(...list.map(i=>i.v));
  let maxList = list.filter(i=>i.v==maxVal).map(i=>i.n);
  document.getElementById('most').innerText = maxList.join("、");
}

function showLeast(){
  let d = window.currentData || {};
  let list=[
    {n:"社交账号",v:sum(d.wx||[0])},
    {n:"购物账号",v:sum(d.qq||[0])},
    {n:"短视频账号",v:sum(d.sp||[0])},
    {n:"音乐/听书账号",v:sum(d.music||[0])},
    {n:"游戏账号",v:sum(d.game||[0])},
    {n:"学习类账号",v:sum(d.art||[0])}
  ];
  let minVal = Math.min(...list.map(i=>i.v));
  let minList = list.filter(i=>i.v==minVal).map(i=>i.n);
  document.getElementById('least').innerText = minList.join("、");
}

async function clearAll(){
  if(!confirm("确定清空云端所有数据？"))return;
  const btn = document.getElementById('clearBtn');
  btn.disabled = true;
  btn.innerText = "清空中...";

  const empty = {
    wx:[0,0,0,0],qq:[0,0,0,0],sp:[0,0,0,0],music:[0,0,0,0],game:[0,0,0,0],art:[0,0,0,0],totalStu:0
  };
  window.currentData = empty;
  document.querySelectorAll('.item-box,.sum-box,#totalStu,#totalAll,.blank').forEach(el=>el.innerText='0');

  fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
    method:"PUT", headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
    body:JSON.stringify(empty)
  }).catch(e=>console.log("云端同步失败：",e))
  .finally(()=>{
    btn.disabled = false;
    btn.innerText = "清空所有数据（重新上课）";
  });
}

load();
setInterval(load,2000);
</script>
</body>
</html>
