<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>教师统计看板</title>
<style>
body{background:#f7f9fc;padding:30px;font-family:微软雅黑}
.wrap{max-width:800px;margin:0 auto}
.title{text-align:center;color:#2d8cf0}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:20px}
.item{background:white;padding:20px;text-align:center;border-radius:8px}
.num{font-size:24px;font-weight:bold;color:#2d8cf0}
.best{background:#fff2f2;padding:20px;border-radius:8px;text-align:center;font-size:20px;margin-top:20px}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="title">数字身份统计</h1>
  <div class="grid">
    <div class="item">QQ<br><span class="num" id="qq">0</span></div>
    <div class="item">微信<br><span class="num" id="wechat">0</span></div>
    <div class="item">游戏<br><span class="num" id="game">0</span></div>
    <div class="item">学习<br><span class="num" id="study">0</span></div>
    <div class="item">抖音<br><span class="num" id="douyin">0</span></div>
  </div>
  <div class="best">🏆 最受欢迎：<span id="best">等待数据</span></div>
</div>

<script>
// 只改这里！！！
const API_KEY = "把你的X-Master-Key粘这里";
const BIN_ID = "把你的Bin ID粘这里";

async function load() {
  let res = await fetch(\`https://api.jsonbin.io/v3/b/\${BIN_ID}/latest\`, {
    headers: { "X-Master-Key": API_KEY }
  });
  let d = (await res.json()).record;

  document.getElementById("qq").innerText = d.qq;
  document.getElementById("wechat").innerText = d.wechat;
  document.getElementById("game").innerText = d.game;
  document.getElementById("study").innerText = d.study;
  document.getElementById("douyin").innerText = d.douyin;

  let max = Math.max(d.qq, d.wechat, d.game, d.study, d.douyin);
  let list = [
    {name:"QQ", val:d.qq},
    {name:"微信", val:d.wechat},
    {name:"游戏账号", val:d.game},
    {name:"学习平台", val:d.study},
    {name:"抖音", val:d.douyin}
  ];
  document.getElementById("best").innerText = list.find(x=>x.val==max).name;
}

load();
setInterval(load, 2000);
</script>
</body>
</html>
