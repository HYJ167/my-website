<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字身份统计·数学融合看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei"}
body{background:#f7f9fc;padding:30px;}
.wrap{max-width:900px;margin:0 auto;}
.main-title{text-align:center;color:#2d8cf0;margin-bottom:10px;font-size:26px;}
.sub-title{text-align:center;color:#666;margin-bottom:25px;font-size:16px;}

/* 数学知识点模块（已学·开学6周） */
.math-box{background:#fff;padding:18px;border-radius:10px;margin-bottom:20px;border-left:4px solid #2d8cf0;}
.math-title{font-weight:bold;color:#2d8cf0;font-size:18px;margin-bottom:12px;}
.math-points{display:flex;justify-content:space-around;flex-wrap:wrap;gap:12px;}
.point{background:#e8f3ff;padding:10px 16px;border-radius:6px;font-size:15px;}

/* 统计展示模块 */
.count-box{background:#fff;padding:28px;border-radius:10px;margin-bottom:20px;}
.count-title{font-weight:bold;font-size:18px;margin-bottom:20px;}
.count-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:18px;text-align:center;}
.count-item{background:#f5f7fa;padding:20px;border-radius:8px;}
.count-item .name{font-size:16px;margin-bottom:10px;}
.count-item .num{font-size:28px;font-weight:bold;color:#2d8cf0;}

/* 数学分析结论 */
.result-box{background:#fff;padding:25px;border-radius:10px;}
.result-item{margin:10px 0;font-size:16px;line-height:1.6;}
.best{background:#fff2f2;padding:18px;border-radius:8px;text-align:center;font-size:24px;font-weight:bold;color:#ff3000;margin-top:20px;}
</style>
</head>
<body>
<div class="wrap">
    <h1 class="main-title">全班数字身份统计</h1>
    <p class="sub-title">信息科技：认识数字身份 | 数学融合：三年级下册·前6周已学知识</p>

    <!-- 显性数学知识点（100%已学） -->
    <div class="math-box">
        <div class="math-title">📘 本节课运用的已学数学知识</div>
        <div class="math-points">
            <span class="point">1.数的大小比较</span>
            <span class="point">2.分类计数求和</span>
            <span class="point">3.除数是一位数的除法</span>
            <span class="point">4.简单平均数计算</span>
            <span class="point">5.数据收集分析</span>
        </div>
    </div>

    <!-- 身份计数统计 -->
    <div class="count-box">
        <div class="count-title">📊 各类数字身份拥有人数统计</div>
        <div class="count-grid">
            <div class="count-item">
                <div class="name">QQ</div>
                <div class="num" id="qq">0</div>
            </div>
            <div class="count-item">
                <div class="name">微信</div>
                <div class="num" id="wechat">0</div>
            </div>
            <div class="count-item">
                <div class="name">游戏账号</div>
                <div class="num" id="game">0</div>
            </div>
            <div class="count-item">
                <div class="name">学习平台</div>
                <div class="num" id="study">0</div>
            </div>
            <div class="count-item">
                <div class="name">抖音</div>
                <div class="num" id="douyin">0</div>
            </div>
        </div>
    </div>

    <!-- 数学核心分析（除法+平均数） -->
    <div class="result-box">
        <div class="result-item">✅ 人数最多的身份：<span id="max" style="font-weight:bold;color:#2d8cf0;">等待数据</span></div>
        <div class="result-item">✅ 人数最少的身份：<span id="min" style="font-weight:bold;color:#2d8cf0;">等待数据</span></div>
        <div class="result-item">✅ 全班参与统计人数：<span id="totalStu">0</span> 人</div>
        <div class="result-item">✅ 身份总数量：<span id="totalNum">0</span> 个</div>
        <div class="result-item">✅ 平均每人拥有身份数：<span id="avg">0</span> 种（除法计算）</div>
        <div class="best">🏆 全班最受欢迎数字身份：<span id="best">等待统计</span></div>
    </div>
</div>

<script>
const API_KEY = "$2a$10$.B7BgbCtQWdTjV4cT0EnoeWEp5QcavXW9y0nmP3rXnGvndnBP9C6u";
const BIN_ID = "69d8a874856a6821891a601b";

async function loadData(){
    try{
        let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
            headers:{"X-Master-Key":API_KEY}
        });
        let data = await res.json();
        let d = data.record;

        // 渲染基础数据
        document.getElementById("qq").innerText = d.qq;
        document.getElementById("wechat").innerText = d.wechat;
        document.getElementById("game").innerText = d.game;
        document.getElementById("study").innerText = d.study;
        document.getElementById("douyin").innerText = d.douyin;
        document.getElementById("totalStu").innerText = d.totalStudent;

        // 1.求和：身份总数量（加法）
        let totalNum = d.qq + d.wechat + d.game + d.study + d.douyin;
        document.getElementById("totalNum").innerText = totalNum;

        // 2.除法求平均数（第二单元核心知识）
        let avg = d.totalStudent > 0 ? (totalNum / d.totalStudent).toFixed(1) : 0;
        document.getElementById("avg").innerText = avg;

        // 3.数的大小比较：找最多/最少
        let arr = [
            {name:"QQ",val:d.qq},
            {name:"微信",val:d.wechat},
            {name:"游戏账号",val:d.game},
            {name:"学习平台",val:d.study},
            {name:"抖音",val:d.douyin}
        ];
        let maxVal = Math.max(...arr.map(i=>i.val));
        let minVal = Math.min(...arr.map(i=>i.val));
        let maxName = arr.find(i=>i.val===maxVal)?.name;
        let minName = arr.find(i=>i.val===minVal)?.name;

        document.getElementById("max").innerText = maxName;
        document.getElementById("min").innerText = minName;
        document.getElementById("best").innerText = maxName;
    }catch(e){
        console.error("加载失败", e);
    }
}

load();
setInterval(load, 2000);
</script>
</body>
</html>
