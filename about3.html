<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>教师数据监控看板</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #F3F4F6; padding: 20px; margin: 0; }
        .dashboard { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #4F46E5; display: flex; justify-content: space-between; align-items: center; }
        .stats { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .stat-box { flex: 1; min-width: 140px; background: #EEF2FF; padding: 20px; border-radius: 15px; text-align: center; }
        .stat-num { font-size: 32px; font-weight: bold; color: #4F46E5; }
        .double-panel { display: flex; gap: 20px; margin: 25px 0; }
        .chart-section, .analysis-section { flex: 1; background: #fff; border: 1px solid #e5e7eb; border-radius: 15px; padding: 25px; }
        .chart-container { display: flex; align-items: flex-end; height: 240px; gap: 6px; padding: 10px 0; border-bottom: 1px solid #e5e7eb; }
        .bar-item { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .bar { width: 80%; background: #6366F1; border-radius: 4px 4px 0 0; }
        .bar-excel { background: #10B981; }
        .bar-good { background: #3B82F6; }
        .bar-normal { background: #F59E0B; }
        .bar-pass { background: #EC4899; }
        .bar-bad { background: #EF4444; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { background: #4F46E5; color: white; padding: 12px; }
        .data-table td { padding: 12px; text-align: center; border-bottom: 1px solid #f0f0f0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #F9FAFB; padding: 15px; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        .badge-good { background: #D1FAE5; color: #065F46; }
        .badge-bad { background: #FEF2F2; color: #991B1B; }
        .live-dot { height: 10px; width: 10px; background: #10B981; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%{opacity:1}50%{opacity:0.4}100%{opacity:1} }
        .empty-state { text-align: center; padding: 40px; color: #9CA3AF; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 8px 15px; border: none; border-radius: 8px; cursor: pointer; }
        .refresh-btn { background: #4F46E5; color: white; }
        .clear-btn { background: #EF4444; color: white; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width:90%; max-width:500px; }
        .tag { padding:4px 8px; border-radius:6px; font-size:13px; font-weight:bold; }
        .tag-excel { background:#D1FAE5; color:#065F46; }
        .tag-good { background:#DBEAFE; color:#1E40AF; }
        .tag-normal { background:#FEF3C7; color:#92400E; }
        .tag-bad { background:#FEE2E2; color:#991B1B; }
        @media (max-width:900px){ .double-panel{flex-direction:column;} }
    </style>
</head>
<body>
<div class="dashboard">
    <h1>
        <span><span class="live-dot"></span>实时数据监控</span>
        <div class="btn-group">
            <button class="clear-btn" onclick="confirmClearData()">🗑️ 清空数据</button>
            <button class="refresh-btn" onclick="loadData()">🔄 立即刷新</button>
        </div>
    </h1>
    <div class="stats">
        <div class="stat-box"><div class="stat-num" id="count">0</div><div>已交卷人数</div></div>
        <div class="stat-box"><div class="stat-num" id="avg">0</div><div>班级平均分</div></div>
        <div class="stat-box"><div class="stat-num" id="highest">0</div><div>最高分</div></div>
        <div class="stat-box"><div class="stat-num" id="fullScore">0</div><div>100分人数</div></div>
        <div class="stat-box"><div class="stat-num" id="failCount">0</div><div>不及格人数</div></div>
    </div>
    <div class="double-panel">
        <div class="chart-section" id="chart-section" style="display:none;">
            <div>📊 全班成绩分布</div>
            <div class="chart-container" id="chart-container"></div>
        </div>
        <div class="analysis-section" id="analysis-panel" style="display:none;">
            <div>📋 成绩分析</div>
            <table class="data-table">
                <tr><th>项目</th><th>数值</th><th>评价</th></tr>
                <tr><td>实考人数</td><td id="a_total">0</td><td>—</td></tr>
                <tr><td>平均分</td><td id="a_avg">0</td><td id="a_avg_text" class="tag">—</td></tr>
                <tr><td>100分</td><td id="a_full">0</td><td id="a_full_text" class="tag">—</td></tr>
                <tr><td>不及格</td><td id="a_fail">0</td><td id="a_fail_text" class="tag">—</td></tr>
                <tr><td>及格率</td><td id="a_pass_rate">0%</td><td id="a_pass_text" class="tag">—</td></tr>
            </table>
        </div>
    </div>
    <table>
        <thead><tr><th>姓名/学号</th><th>得分</th><th>正确率</th><th>时间</th><th>操作</th></tr></thead>
        <tbody id="table-body"><tr><td colspan="5" class="empty-state">等待学生提交...</td></tr></tbody>
    </table>
</div>
<div id="detail-modal" class="modal-overlay"><div class="modal-content"><span onclick="closeDetailModal()" style="float:right;cursor:pointer">&times;</span><h2>答题详情</h2><div id="detail-content"></div><button onclick="closeDetailModal()" style="width:100%;margin-top:20px">关闭</button></div></div>
<div id="clear-confirm-modal" class="modal-overlay"><div class="modal-content" style="text-align:center"><h3>确认清空？</h3><p>不可恢复</p><button onclick="document.getElementById('clear-confirm-modal').classList.remove('active')">取消</button><button class="clear-btn" onclick="executeClearData()">确认清空</button></div></div>

<script>
const BIN_ID = '69c0965eaa77b81da90c9aeb';
const API_KEY = '$2a$10$.B7BgbCtQWdTjV4cT0EnoeWEp5QcavXW9y0nmP3rXnGvndnBP9C6u';
let allData = [];

async function loadData(){
    const res=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':API_KEY}});
    const json=await res.json();
    allData=Array.isArray(json.record)?json.record:[];
    renderTable();updateStats();updateAnalysis();renderChart();
}

function renderTable(){
    const clean=allData.filter(x=>x.name&&x.name!=="System_Reset"&&typeof x.score==="number");
    const tbody=document.getElementById('table-body');
    if(clean.length===0){tbody.innerHTML='<tr><td colspan="5" class="empty-state">等待学生提交...</td></tr>';return;}
    tbody.innerHTML=[...clean].reverse().map(row=>`
    <tr>
        <td><strong>${row.name}</strong></td>
        <td><span class="badge ${row.score>=60?'badge-good':'badge-bad'}">${row.score}分</span></td>
        <td>${Math.round(row.score)}%</td>
        <td>${row.date||''}</td>
        <td><button onclick='showDetail(${JSON.stringify(row.userAnswers||[])},"${row.name}")'>查看</button></td>
    </tr>`).join('');
}

function updateStats(){
    const clean=allData.filter(x=>x.name&&typeof x.score==="number");
    const total=clean.length;
    document.getElementById('count').innerText=total;
    if(total===0){document.getElementById('avg').innerText=0;document.getElementById('highest').innerText=0;document.getElementById('fullScore').innerText=0;document.getElementById('failCount').innerText=0;return;}
    const scores=clean.map(x=>x.score);
    const sum=scores.reduce((a,b)=>a+b,0);
    const avg=Math.round(sum/total);
    const max=Math.max(...scores);
    const full=scores.filter(s=>s==100).length;
    const fail=scores.filter(s=>s<60).length;
    document.getElementById('avg').innerText=avg;
    document.getElementById('highest').innerText=max;
    document.getElementById('fullScore').innerText=full;
    document.getElementById('failCount').innerText=fail;
}

function updateAnalysis(){
    const clean=allData.filter(x=>x.name&&typeof x.score==="number");
    const panel=document.getElementById('analysis-panel');
    if(clean.length===0){panel.style.display='none';return;}
    panel.style.display='block';
    const total=clean.length;
    const scores=clean.map(x=>x.score);
    const sum=scores.reduce((a,b)=>a+b,0);
    const avg=Math.round(sum/total);
    const full=scores.filter(s=>s==100).length;
    const fail=scores.filter(s=>s<60).length;
    const passRate=((total-fail)/total*100).toFixed(1);
    document.getElementById('a_total').innerText=total;
    document.getElementById('a_avg').innerText=avg;
    document.getElementById('a_full').innerText=full;
    document.getElementById('a_fail').innerText=fail;
    document.getElementById('a_pass_rate').innerText=passRate+'%';
}

function renderChart(){
    const clean=allData.filter(x=>x.name&&typeof x.score==="number");
    const container=document.getElementById('chart-container');
    const section=document.getElementById('chart-section');
    if(clean.length===0){section.style.display='none';return;}
    section.style.display='block';
    const ranges=[
        {name:'0-59',min:0,max:59,cls:'bar-bad'},
        {name:'60-69',min:60,max:69,cls:'bar-pass'},
        {name:'70-79',min:70,max:79,cls:'bar-normal'},
        {name:'80-89',min:80,max:89,cls:'bar-good'},
        {name:'90-100',min:90,max:100,cls:'bar-excel'},
    ];
    ranges.forEach(r=>r.count=clean.filter(s=>s.score>=r.min&&s.score<=r.max).length);
    const max=Math.max(...ranges.map(x=>x.count),1);
    container.innerHTML=ranges.map(r=>`
    <div class="bar-item">
        <div class="bar ${r.cls}" style="height:${r.count/max*180}px"></div>
        <div style="font-size:12px;margin-top:6px">${r.name}</div>
    </div>`).join('');
}

function showDetail(detail,name){
    const m=document.getElementById('detail-modal');
    const c=document.getElementById('detail-content');
    let html=`<h3>${name}</h3><ul>`;
    detail.forEach((i,idx)=>{
        html+=`<li>${i.q||'第'+(idx+1)+'题'} — ${i.isCorrect?'✅':'❌'} 答：${i.user||'未选'}</li>`;
    });
    c.innerHTML=html+'</ul>';
    m.classList.add('active');
}

function closeDetailModal(){document.getElementById('detail-modal').classList.remove('active');}
function confirmClearData(){document.getElementById('clear-confirm-modal').classList.add('active');}
async function executeClearData(){
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
        method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
        body:JSON.stringify([])
    });
    allData=[];renderTable();updateStats();updateAnalysis();renderChart();
    document.getElementById('clear-confirm-modal').classList.remove('active');
}

loadData();
setInterval(loadData,5000);
</script>
</body>
</html>
