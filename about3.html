<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>教师数据监控看板 (JSONBin版)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #F3F4F6; padding: 20px; margin: 0; }
        .dashboard { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #4F46E5; display: flex; justify-content: space-between; align-items: center; }
        .stats { display: flex; gap: 20px; margin: 20px 0; }
        .stat-box { flex: 1; background: #EEF2FF; padding: 20px; border-radius: 15px; text-align: center; }
        .stat-num { font-size: 32px; font-weight: bold; color: #4F46E5; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #F9FAFB; text-align: left; padding: 15px; color: #6B7280; font-weight: 600; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        .badge-good { background: #D1FAE5; color: #065F46; }
        .badge-bad { background: #FEF2F2; color: #991B1B; }
        .live-dot { height: 10px; width: 10px; background: #10B981; border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .empty-state { text-align: center; padding: 40px; color: #9CA3AF; }
        button.refresh-btn { padding: 8px 15px; background: #4F46E5; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        button.refresh-btn:hover { background: #4338ca; }
        
        /* 详情弹窗样式 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        .close-modal { float: right; cursor: pointer; font-size: 24px; color: #999; }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>
        <span><span class="live-dot"></span>实时数据监控 (JSONBin)</span>
        <button class="refresh-btn" onclick="loadData()"> 立即刷新</button>
    </h1>
    
    <div class="stats">
        <div class="stat-box"><div class="stat-num" id="count">0</div><div>已交卷人数</div></div>
        <div class="stat-box"><div class="stat-num" id="avg">0</div><div>班级平均分</div></div>
        <div class="stat-box"><div class="stat-num" id="highest">0</div><div>最高分</div></div>
    </div>

    <table>
        <thead>
            <tr><th>姓名/学号</th><th>得分</th><th>正确率</th><th>提交时间</th><th>操作</th></tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="5" class="empty-state">等待学生提交数据...</td></tr>
        </tbody>
    </table>
</div>

<!-- 详情弹窗 -->
<div id="detail-modal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="closeDetailModal()">&times;</span>
        <h2 style="margin-top:0; color:#4F46E5;">答题详情</h2>
        <div id="detail-content" style="line-height: 1.6;"></div>
        <button class="refresh-btn" style="width:100%; margin-top:20px;" onclick="closeDetailModal()">关闭</button>
    </div>
</div>

<script>
    // ================= ⚠️ 重要：配置区域 (JSONBin) ⚠️ =================
    // ⚠️ 必须与学生端填写的 BIN_ID 和 API_KEY 完全一致！
    const BIN_ID = '69c0965eaa77b81da90c9aeb';       // 例如: '69c0965eaa77b81da90c9aeb'
    const API_KEY = '$2a$10$.B7BgbCtQWdTjV4cT0EnoeWEp5QcavXW9y0nmP3rXnGvndnBP9C6u';  // 例如: '$2a$10$xxxx...'
    
    // 自动构建 API 地址 (JSONBin v3)
    const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;
    // =======================================================

    let allData = [];

    async function loadData() {
        // 检查配置是否填写
        if (BIN_ID === '在此处填入你的_BIN_ID' || API_KEY === '在此处填入你的_Master_Key') {
            console.error("❌ 配置错误：请在代码中填入正确的 BIN_ID 和 API_KEY");
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:red;">⚠️ 配置未完成<br>请在 HTML 代码第 106-107 行填入 BIN_ID 和 Master Key</td></tr>`;
            return;
        }

        const tbody = document.getElementById('table-body');
        // 如果是第一次加载且为空，显示加载中
        if (allData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">正在从云端加载数据...</td></tr>';
        }

        try {
            // JSONBin 需要 header 携带 Master Key 才能读取私有 Bin
            const res = await fetch(API_URL, {
                method: 'GET',
                headers: {
                    'X-Master-Key': API_KEY
                }
            });

            if (!res.ok) {
                throw new Error(`服务器响应错误: ${res.status} (请检查 Key 是否正确)`);
            }
            
            const jsonResponse = await res.json();
            
            // JSONBin v3 返回格式是 { record: [...], metadata: {...} }
            // 我们需要提取 record 部分
            let data = jsonResponse.record;

            // 确保数据是数组
            if (!data) {
                data = []; // 如果云端是空的，初始化为空数组
            } else if (!Array.isArray(data)) {
                // 如果云端存的是单个对象而不是数组，强制转为数组
                data = [data];
            }

            allData = data;
            renderTable();
            updateStats();

        } catch (e) {
            console.error("加载失败:", e);
            if (allData.length === 0) {
                let msg = e.message;
                if (e.message.includes('401')) msg = "密钥错误 (401)";
                if (e.message.includes('404')) msg = "找不到该 Bin (404)";
                
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:red;">加载失败<br><small>${msg}</small><br>请检查：1. BIN_ID 2. API_KEY (Master Key) 3. 网络连接</td></tr>`;
            }
            // 如果有旧数据，静默失败，保持显示旧数据
        }
    }

    function renderTable() {
        const tbody = document.getElementById('table-body');
        if (allData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty-state">等待学生提交数据...</td></tr>';
            return;
        }

        // 按提交顺序倒序（新提交的在后面，反转后最新的在最上面）
        const displayData = [...allData].reverse();

        tbody.innerHTML = displayData.map((row, index) => {
            // ✅ 安全获取数据
            const name = row.name || '未知用户';
            const score = typeof row.score === 'number' ? row.score : 0;
            const total = typeof row.total === 'number' && row.total > 0 ? row.total : 100;
            const percent = Math.round((score / total) * 100);
            
            const badgeClass = percent >= 60 ? 'badge-good' : 'badge-bad';
            
            // 时间处理：优先用 date 字段，没有则显示“刚刚”
            const timeStr = row.date ? row.date : '<span style="color:#999">刚刚</span>';
            
            // 详情按钮：检查是否有 userAnswers 或 details 字段
            // 学生端代码里我们存的是 userAnswers 数组
            const answersData = row.userAnswers || row.details; 
            
            let detailBtn = '';
            if (answersData && Array.isArray(answersData)) {
                const safeData = encodeURIComponent(JSON.stringify(answersData));
                detailBtn = `<button onclick="showDetail('${safeData}', '${name}')" style="cursor:pointer; background:none; border:none; color:#4F46E5; font-weight:bold; text-decoration:underline;">查看</button>`;
            } else {
                detailBtn = `<span style="color:#ccc; font-size:12px;">暂无详情</span>`;
            }

            return `
                <tr>
                    <td><strong>${name}</strong></td>
                    <td><span class="badge ${badgeClass}">${score}分</span></td>
                    <td>${percent}%</td>
                    <td style="font-size:13px; color:#666;">${timeStr}</td>
                    <td>${detailBtn}</td>
                </tr>
            `;
        }).join('');
    }

    function updateStats() {
        document.getElementById('count').innerText = allData.length;
        if (allData.length > 0) {
            const totalScore = allData.reduce((sum, item) => sum + (typeof item.score === 'number' ? item.score : 0), 0);
            const scores = allData.map(i => typeof i.score === 'number' ? item.score : 0);
            // 修复 reduce 里的变量名错误
            const validScores = allData.map(i => typeof i.score === 'number' ? i.score : 0);
            const maxScore = validScores.length > 0 ? Math.max(...validScores) : 0;
            
            document.getElementById('avg').innerText = Math.round(totalScore / allData.length);
            document.getElementById('highest').innerText = maxScore;
        } else {
            document.getElementById('avg').innerText = 0;
            document.getElementById('highest').innerText = 0;
        }
    }

    // 显示详情弹窗
    function showDetail(encodedData, name) {
        try {
            const data = JSON.parse(decodeURIComponent(encodedData));
            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('detail-content');
            
            let html = `<h3>学生：${name}</h3><ul style="padding-left:20px;">`;
            data.forEach((item, idx) => {
                const status = item.isCorrect ? '✅ 正确' : '❌ 错误';
                const qText = item.q || `第${idx+1}题`;
                const uText = item.user || '未作答';
                
                html += `<li style="margin-bottom:12px; border-bottom:1px solid #f0f0f0; padding-bottom:8px;">
                    <div style="font-weight:bold; color:#333;">${qText}</div>
                    <div style="font-size:14px; margin-top:4px;">${status} &nbsp; 你的回答：${uText}</div>
                </li>`;
            });
            html += '</ul>';
            
            content.innerHTML = html;
            modal.classList.add('active');
        } catch (e) {
            alert("解析详情失败：" + e.message);
        }
    }

    function closeDetailModal() {
        document.getElementById('detail-modal').classList.remove('active');
    }

    // 初始化加载
    loadData();
    // 每 5 秒自动刷新
    setInterval(loadData, 5000);
</script>
</body>
</html>
