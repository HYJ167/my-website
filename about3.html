<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>教师数据监控看板 (含成绩条形图)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #F3F4F6; padding: 20px; margin: 0; }
        .dashboard { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #4F46E5; display: flex; justify-content: space-between; align-items: center; }
        
        .stats { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .stat-box { flex: 1; min-width: 140px; background: #EEF2FF; padding: 20px; border-radius: 15px; text-align: center; }
        .stat-num { font-size: 32px; font-weight: bold; color: #4F46E5; }
        
        /* 条形图区域 */
        .chart-section {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 15px;
            padding: 25px;
            margin: 25px 0;
        }
        .chart-header {
            font-size: 18px;
            font-weight: bold;
            color: #1F2937;
            margin-bottom: 20px;
        }
        .chart-container {
            display: flex;
            align-items: flex-end;
            height: 260px;
            gap: 6px;
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
            position: relative;
        }
        .bar-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            min-height: 10px;
        }
        .bar {
            width: 80%;
            background: #6366F1;
            border-radius: 4px 4px 0 0;
            transition: height 0.4s;
            position: relative;
        }
        .bar-label {
            margin-top: 6px;
            font-size: 12px;
            color: #6B7280;
            font-weight: 500;
        }
        .bar-count {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: bold;
            color: #374151;
            white-space: nowrap;
        }

        /* 颜色分段 */
        .bar-excel { background: #10B981; } /* 90-100 */
        .bar-good { background: #3B82F6; }   /* 80-89 */
        .bar-normal { background: #F59E0B; } /* 70-79 */
        .bar-pass { background: #EC4899; }   /* 60-69 */
        .bar-bad { background: #EF4444; }    /* 0-59 */

        .analysis-section {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 15px;
            padding: 25px;
            margin: 25px 0;
        }
        .analysis-header { font-size: 18px; font-weight: bold; color: #1F2937; margin-bottom: 15px; }
        
        .data-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; }
        .data-table th {
            background: #4F46E5;
            color: white;
            padding: 14px;
            text-align: center;
            font-weight: 600;
        }
        .data-table td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
            font-size: 15px;
        }
        .data-table tr:nth-child(even) { background: #F9FAFB; }

        .tag { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 14px; font-weight: bold; }
        .tag-excel { background: #D1FAE5; color: #065F46; }
        .tag-good { background: #DBEAFE; color: #1E40AF; }
        .tag-normal { background: #FEF3C7; color: #92400E; }
        .tag-bad { background: #FEE2E2; color: #991B1B; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #F9FAFB; text-align: left; padding: 15px; color: #6B7280; font-weight: 600; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        .badge-good { background: #D1FAE5; color: #065F46; }
        .badge-bad { background: #FEF2F2; color: #991B1B; }
        
        .live-dot { height: 10px; width: 10px; background: #10B981; border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .empty-state { text-align: center; padding: 40px; color: #9CA3AF; }
        
        .btn-group { display: flex; gap: 10px; }
        button.refresh-btn { padding: 8px 15px; background: #4F46E5; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        button.refresh-btn:hover { background: #4338ca; transform: translateY(-1px); }
        
        button.clear-btn { padding: 8px 15px; background: #EF4444; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        button.clear-btn:hover { background: #DC2626; transform: translateY(-1px); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        .close-modal { float: right; cursor: pointer; font-size: 24px; color: #999; }
        
        @media (max-width: 768px) {
            .stats { flex-direction: column; }
            .bar-label { font-size: 10px; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>
        <span><span class="live-dot"></span>实时数据监控</span>
        <div class="btn-group">
            <button class="clear-btn" onclick="confirmClearData()">🗑️ 清空数据</button>
            <button class="refresh-btn" onclick="loadData()">🔄 立即刷新</button>
        </div>
    </h1>
    
    <div class="stats">
        <div class="stat-box"><div class="stat-num" id="count">0</div><div>已交卷人数</div></div>
        <div class="stat-box"><div class="stat-num" id="avg">0</div><div>班级平均分</div></div>
        <div class="stat-box"><div class="stat-num" id="highest">0</div><div>最高分</div></div>
        <div class="stat-box"><div class="stat-num" id="fullScore">0</div><div>100分人数</div></div>
        <div class="stat-box"><div class="stat-num" id="failCount">0</div><div>不及格人数</div></div>
    </div>

    <!-- 条形统计图 -->
    <div class="chart-section" id="chart-section" style="display:none;">
        <div class="chart-header">📊 全班成绩分布条形图</div>
        <div class="chart-container" id="chart-container"></div>
    </div>

    <div class="analysis-section" id="analysis-panel" style="display:none;">
        <div class="analysis-header">📋 全班成绩数据分析</div>
        <table class="data-table">
            <tr>
                <th>项目</th>
                <th>数值</th>
                <th>学情评价</th>
            </tr>
            <tr>
                <td>实考人数</td>
                <td id="a_total">0</td>
                <td>—</td>
            </tr>
            <tr>
                <td>平均分</td>
                <td id="a_avg">0</td>
                <td id="a_avg_text" class="tag tag-normal">待数据</td>
            </tr>
            <tr>
                <td>100分人数</td>
                <td id="a_full">0</td>
                <td id="a_full_text" class="tag tag-good">待数据</td>
            </tr>
            <tr>
                <td>不及格人数（＜60）</td>
                <td id="a_fail">0</td>
                <td id="a_fail_text" class="tag tag-bad">待数据</td>
            </tr>
            <tr>
                <td>及格率</td>
                <td id="a_pass_rate">0%</td>
                <td id="a_pass_text" class="tag tag-normal">待数据</td>
            </tr>
        </table>
    </div>

    <table>
        <thead>
            <tr><th>姓名/学号</th><th>得分</th><th>正确率</th><th>提交时间</th><th>操作</th></tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="5" class="empty-state">等待学生提交数据...</td></tr>
        </tbody>
    </table>
</div>

<!-- 详情弹窗 -->
<div id="detail-modal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="closeDetailModal()">&times;</span>
        <h2 style="margin-top:0; color:#4F46E5;">答题详情</h2>
        <div id="detail-content" style="line-height: 1.6;"></div>
        <button class="refresh-btn" style="width:100%; margin-top:20px;" onclick="closeDetailModal()">关闭</button>
    </div>
</div>

<!-- 确认清空弹窗 -->
<div id="clear-confirm-modal" class="modal-overlay">
    <div class="modal-content" style="text-align: center;">
        <div style="font-size: 50px; margin-bottom: 10px;">⚠️</div>
        <h3 style="color: #EF4444;">确认清空所有数据？</h3>
        <p style="color: #666; margin-bottom: 20px;">此操作不可恢复，所有学生的成绩记录将被永久删除。</p>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="refresh-btn" style="background: #ccc;" onclick="document.getElementById('clear-confirm-modal').classList.remove('active')">取消</button>
            <button class="clear-btn" id="btn-execute-clear" onclick="executeClearData()">确认清空</button>
        </div>
    </div>
</div>

<script>
    const BIN_ID = '69c0965eaa77b81da90c9aeb'; 
    const API_KEY = '$2a$10$.B7BgbCtQWdTjV4cT0EnoeWEp5QcavXW9y0nmP3rXnGvndnBP9C6u'; 
    const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
    const API_LATEST_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;

    let allData = [];

    // 确认清空
    function confirmClearData() {
        document.getElementById('clear-confirm-modal').classList.add('active');
    }

    // 执行清空
    async function executeClearData() {
        const btn = document.getElementById('btn-execute-clear');
        btn.disabled = true;
        btn.innerText = "清空中...";
        try {
            const dummyData = [{ name: "System_Reset", score: 0, date: new Date().toLocaleString(), isDummy: true }];
            await fetch(API_URL, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(dummyData)
            });
            allData = [];
            renderTable();
            updateStats();
            updateAnalysis();
            renderChart();
            document.getElementById('clear-confirm-modal').classList.remove('active');
            alert("✅ 数据已清空");
        } catch (e) {
            alert("清空失败：" + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "确认清空";
        }
    }

    // 绘制条形图
    function renderChart() {
        const container = document.getElementById('chart-container');
        const chartSection = document.getElementById('chart-section');

        const real = allData.filter(i =>
            i.name && i.name.trim() !== '' && i.name !== "System_Reset" && !i.isDummy &&
            typeof i.score === 'number' && !isNaN(i.score)
        );

        if (real.length === 0) {
            chartSection.style.display = 'none';
            return;
        }
        chartSection.style.display = 'block';

        // 分数段
        const ranges = [
            { name: '0-59', min: 0, max: 59, cls: 'bar-bad' },
            { name: '60-69', min: 60, max: 69, cls: 'bar-pass' },
            { name: '70-79', min: 70, max: 79, cls: 'bar-normal' },
            { name: '80-89', min: 80, max: 89, cls: 'bar-good' },
            { name: '90-100', min: 90, max: 100, cls: 'bar-excel' },
        ];

        // 统计每个分段人数
        ranges.forEach(r => {
            r.count = real.filter(s => s.score >= r.min && s.score <= r.max).length;
        });

        const maxCount = Math.max(...ranges.map(r => r.count), 1);

        // 渲染柱子
        container.innerHTML = ranges.map(r => {
            const h = r.count / maxCount * 200;
            return `
            <div class="bar-item">
                <div class="bar ${r.cls}" style="height:${h}px">
                    <div class="bar-count">${r.count}</div>
                </div>
                <div class="bar-label">${r.name}</div>
            </div>`;
        }).join('');
    }

    // 分析数据
    function updateAnalysis() {
        const panel = document.getElementById('analysis-panel');
        const real = allData.filter(i =>
            i.name && i.name.trim() !== '' && i.name !== "System_Reset" && !i.isDummy &&
            typeof i.score === 'number' && !isNaN(i.score)
        );
        if (real.length === 0) { panel.style.display = 'none'; return; }
        panel.style.display = 'block';

        const total = real.length;
        const scores = real.map(i => i.score);
        const sum = scores.reduce((a, b) => a + b, 0);
        const avg = Math.round(sum / total);
        const fullScoreCnt = scores.filter(s => s == 100).length;
        const failCnt = scores.filter(s => s < 60).length;
        const passCnt = total - failCnt;
        const passRate = (passCnt / total * 100).toFixed(1);

        document.getElementById('a_total').innerText = total;
        document.getElementById('a_avg').innerText = avg;
        document.getElementById('a_full').innerText = fullScoreCnt;
        document.getElementById('a_fail').innerText = failCnt;
        document.getElementById('a_pass_rate').innerText = passRate + '%';

        document.getElementById('a_avg_text').className = avg >= 85 ? 'tag tag-excel' : avg >= 70 ? 'tag tag-good' : 'tag tag-bad';
        document.getElementById('a_avg_text').innerText = avg >= 85 ? '优秀' : avg >= 70 ? '良好' : '薄弱';

        document.getElementById('a_full_text').className = fullScoreCnt > 0 ? 'tag tag-excel' : 'tag tag-normal';
        document.getElementById('a_full_text').innerText = fullScoreCnt > 0 ? '表现突出' : '暂无满分';

        document.getElementById('a_fail_text').className = failCnt > 0 ? 'tag tag-bad' : 'tag tag-excel';
        document.getElementById('a_fail_text').innerText = failCnt > 0 ? '需重点辅导' : '全员及格';

        document.getElementById('a_pass_text').className = passRate >= 90 ? 'tag tag-excel' : passRate >= 70 ? 'tag tag-good' : 'tag tag-bad';
        document.getElementById('a_pass_text').innerText = passRate >= 90 ? '整体优秀' : passRate >= 70 ? '基本达标' : '整体薄弱';
    }

    // 加载数据
    async function loadData() {
        try {
            const res = await fetch(API_LATEST_URL, { headers: { 'X-Master-Key': API_KEY } });
            const json = await res.json();
            let data = json.record || [];
            if (!Array.isArray(data)) data = [data];
            allData = data;
            renderTable();
            updateStats();
            updateAnalysis();
            renderChart();
        } catch (e) { console.error(e); }
    }

    // 表格
    function renderTable() {
        const tbody = document.getElementById('table-body');
        const clean = allData.filter(row =>
            row.name && row.name.trim() && row.name !== "System_Reset" && !row.isDummy &&
            typeof row.score === 'number' && !isNaN(row.score)
        );
        if (clean.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty-state">等待学生提交数据...</td></tr>';
            return;
        }
        tbody.innerHTML = [...clean].reverse().map(row => {
            const score = row.score;
            const percent = Math.round((score / 100) * 100);
            const badge = percent >= 60 ? 'badge-good' : 'badge-bad';
            const time = row.date || '刚刚';
            const detail = row.userAnswers
                ? `<button onclick="showDetail('${encodeURIComponent(JSON.stringify(row.userAnswers))}','${row.name}')" style="color:#4F46E5;border:none;background:none;cursor:pointer;text-decoration:underline">查看</button>`
                : '<span style="color:#ccc">无详情</span>';
            return `
            <tr>
                <td><strong>${row.name}</strong></td>
                <td><span class="badge ${badge}">${score}分</span></td>
                <td>${percent}%</td>
                <td style="font-size:13px;color:#666">${time}</td>
                <td>${detail}</td>
            </tr>`;
        }).join('');
    }

    // 统计卡片
    function updateStats() {
        const clean = allData.filter(row =>
            row.name && row.name.trim() && row.name !== "System_Reset" && !row.isDummy &&
            typeof row.score === 'number' && !isNaN(row.score)
        );
        const total = clean.length;
        document.getElementById('count').innerText = total;
        if (total === 0) {
            document.getElementById('avg').innerText = 0;
            document.getElementById('highest').innerText = 0;
            document.getElementById('fullScore').innerText = 0;
            document.getElementById('failCount').innerText = 0;
            return;
        }
        const scores = clean.map(i => i.score);
        const sum = scores.reduce((a, b) => a + b, 0);
        const avg = Math.round(sum / total);
        const max = Math.max(...scores);
        const full = scores.filter(s => s == 100).length;
        const fail = scores.filter(s => s < 60).length;

        document.getElementById('avg').innerText = avg;
        document.getElementById('highest').innerText = max;
        document.getElementById('fullScore').innerText = full;
        document.getElementById('failCount').innerText = fail;
    }

    // 详情弹窗
    function showDetail(enc, name) {
        try {
            const d = JSON.parse(decodeURIComponent(enc));
            const m = document.getElementById('detail-modal');
            const c = document.getElementById('detail-content');
            let html = `<h3>${name}</h3><ul style="padding-left:20px">`;
            d.forEach((i, idx) => {
                const ok = i.isCorrect ? '✅ 正确' : '❌ 错误';
                html += `<li style="margin-bottom:10px;border-bottom:1px solid #f0f0f0;padding-bottom:6px">
                    <div>${i.q || '第' + (idx + 1) + '题'}</div>
                    <div style="font-size:14px">${ok} 答：${i.user || '未选'}</div>
                </li>`;
            });
            c.innerHTML = html + '</ul>';
            m.classList.add('active');
        } catch (e) { alert('解析失败'); }
    }

    function closeDetailModal() {
        document.getElementById('detail-modal').classList.remove('active');
    }

    // 初始化
    loadData();
    setInterval(loadData, 5000);
</script>
</body>
</html>
