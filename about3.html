<script>
const BIN_ID = '69c0965eaa77b81da90c9aeb';
const API_KEY = '$2a$10$.B7BgbCtQWdTjV4cT0EnoeWEp5QcavXW9y0nmP3rXnGvndnBP9C6u';
const API_LATEST = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;
const API_PUT = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

let allData = [];
let isLoading = false;
let clearCooldown = false; // 防频繁点清空

document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('clearBtn').addEventListener('click', function() {
        if (clearCooldown) return; // 冷却中，直接忽略
        document.getElementById('clear-confirm-modal').classList.add('active');
    });

    document.getElementById('confirmClearBtn').addEventListener('click', function() {
        executeClearData();
    });
});

async function executeClearData() {
    document.getElementById('clear-confirm-modal').classList.remove('active');
    if (clearCooldown) return;
    clearCooldown = true;

    // 1. 前端立刻清空（100%生效）
    allData = [];
    renderTable();
    updateStats();
    updateAnalysis();
    renderChart();

    // 2. 尝试云端清空（PUT 空数组）
    try {
        const res = await fetch(API_PUT, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-Master-Key': API_KEY
            },
            body: JSON.stringify([])
        });
        if (res.ok) {
            console.log('✅ 云端已清空');
        } else {
            console.log('❌ 云端清空被拒绝（免费版限制）', res.status);
        }
    } catch (e) {
        console.log('❌ 云端清空网络错误或被限制', e);
    }

    // 3 秒冷却，防止狂点触发限制
    setTimeout(() => { clearCooldown = false; }, 3000);
}

// 静默加载
async function loadData() {
    if (isLoading) return;
    isLoading = true;
    try {
        const res = await fetch(API_LATEST, { headers: { 'X-Master-Key': API_KEY } });
        if (!res.ok) throw new Error('err');
        const json = await res.json();
        let data = json.record || [];
        if (!Array.isArray(data)) data = [];
        allData = data;
        renderTable();
        updateStats();
        updateAnalysis();
        renderChart();
    } catch (e) {
        // 静默失败
    } finally {
        isLoading = false;
    }
}

function renderTable() {
    const tbody = document.getElementById('table-body');
    const clean = allData.filter(row =>
        row.name && row.name.trim() &&
        typeof row.score === 'number' && !isNaN(row.score)
    );
    if (clean.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-state">等待学生提交数据...</td></tr>';
        return;
    }
    tbody.innerHTML = [...clean].reverse().map(row => {
        const score = row.score;
        const percent = Math.round(score);
        const badge = percent >= 60 ? 'badge-good' : 'badge-bad';
        const time = row.date || '刚刚';
        return `
        <tr>
            <td><strong>${row.name}</strong></td>
            <td><span class="badge ${badge}">${score}分</span></td>
            <td>${percent}%</td>
            <td style="font-size:13px;color:#666">${time}</td>
            <td><button onclick="showDetail('${encodeURIComponent(JSON.stringify(row.userAnswers||[]))}','${row.name}')" style="color:#4F46E5;border:none;background:none;cursor:pointer;text-decoration:underline">查看</button></td>
        </tr>`;
    }).join('');
}

function updateStats() {
    const clean = allData.filter(row =>
        row.name && row.name.trim() &&
        typeof row.score === 'number' && !isNaN(row.score)
    );
    const total = clean.length;
    document.getElementById('count').innerText = total;
    if (total === 0) {
        document.getElementById('avg').innerText = 0;
        document.getElementById('highest').innerText = 0;
        document.getElementById('fullScore').innerText = 0;
        document.getElementById('failCount').innerText = 0;
        return;
    }
    const scores = clean.map(i => i.score);
    const sum = scores.reduce((a, b) => a + b, 0);
    const avg = Math.round(sum / total);
    const max = Math.max(...scores);
    const full = scores.filter(s => s == 100).length;
    const fail = scores.filter(s => s < 60).length;

    document.getElementById('avg').innerText = avg;
    document.getElementById('highest').innerText = max;
    document.getElementById('fullScore').innerText = full;
    document.getElementById('failCount').innerText = fail;
}

function updateAnalysis() {
    const panel = document.getElementById('analysis-panel');
    const real = allData.filter(i =>
        i.name && i.name.trim() &&
        typeof i.score === 'number' && !isNaN(i.score)
    );
    if (real.length === 0) { panel.style.display = 'none'; return; }
    panel.style.display = 'block';

    const total = real.length;
    const scores = real.map(i => i.score);
    const sum = scores.reduce((a, b) => a + b, 0);
    const avg = Math.round(sum / total);
    const fullScoreCnt = scores.filter(s => s == 100).length;
    const failCnt = scores.filter(s => s < 60).length;
    const passCnt = total - failCnt;
    const passRate = (passCnt / total * 100).toFixed(1);

    document.getElementById('a_total').innerText = total;
    document.getElementById('a_avg').innerText = avg;
    document.getElementById('a_full').innerText = fullScoreCnt;
    document.getElementById('a_fail').innerText = failCnt;
    document.getElementById('a_pass_rate').innerText = passRate + '%';

    let avgTag = avg >= 85 ? 'tag-excel' : avg >= 70 ? 'tag-good' : 'tag-bad';
    let avgText = avg >= 85 ? '优秀' : avg >= 70 ? '良好' : '薄弱';
    document.getElementById('a_avg_text').className = 'tag ' + avgTag;
    document.getElementById('a_avg_text').innerText = avgText;

    let fullTag = fullScoreCnt > 0 ? 'tag-excel' : 'tag-normal';
    let fullText = fullScoreCnt > 0 ? '表现突出' : '暂无满分';
    document.getElementById('a_full_text').className = 'tag ' + fullTag;
    document.getElementById('a_full_text').innerText = fullText;

    let failTag = failCnt > 0 ? 'tag-bad' : 'tag-excel';
    let failText = failCnt > 0 ? '需重点辅导' : '全员及格';
    document.getElementById('a_fail_text').className = 'tag ' + failTag;
    document.getElementById('a_fail_text').innerText = failText;

    let passTag = passRate >= 90 ? 'tag-excel' : passRate >= 70 ? 'tag-good' : 'tag-bad';
    let passText = passRate >= 90 ? '整体优秀' : passRate >= 70 ? '基本达标' : '整体薄弱';
    document.getElementById('a_pass_text').className = 'tag ' + passTag;
    document.getElementById('a_pass_text').innerText = passText;
}

function renderChart() {
    const container = document.getElementById('chart-container');
    const chartSection = document.getElementById('chart-section');
    const real = allData.filter(s =>
        s.name && s.name.trim() &&
        typeof s.score === 'number' && !isNaN(s.score)
    );
    if (real.length === 0) {
        chartSection.style.display = 'none';
        return;
    }
    chartSection.style.display = 'block';

    const ranges = [
        { name: '0-59', min: 0, max: 59, cls: 'bar-bad' },
        { name: '60-69', min: 60, max: 69, cls: 'bar-pass' },
        { name: '70-79', min: 70, max: 79, cls: 'bar-normal' },
        { name: '80-89', min: 80, max: 89, cls: 'bar-good' },
        { name: '90-100', min: 90, max: 100, cls: 'bar-excel' },
    ];

    ranges.forEach(r => {
        r.count = real.filter(s => s.score >= r.min && s.score <= r.max).length;
    });

    const maxCount = Math.max(...ranges.map(r => r.count), 1);
    container.innerHTML = ranges.map(r => {
        const h = r.count / maxCount * 180;
        return `
        <div class="bar-item">
            <div class="bar ${r.cls}" style="height:${h}px">
                <div class="bar-count">${r.count}</div>
            </div>
            <div class="bar-label">${r.name}</div>
        </div>`;
    }).join('');
}

function showDetail(enc, name) {
    try {
        const d = JSON.parse(decodeURIComponent(enc));
        const m = document.getElementById('detail-modal');
        const c = document.getElementById('detail-content');
        let html = `<h3>${name}</h3><ul style="padding-left:20px">`;
        d.forEach((i, idx) => {
            const ok = i.isCorrect ? '✅ 正确' : '❌ 错误';
            html += `<li style="margin-bottom:10px;border-bottom:1px solid #f0f0f0;padding-bottom:6px">
                <div>${i.q || '第' + (idx + 1) + '题'}</div>
                <div style="font-size:14px">${ok}  答：${i.user || '未选'}</div>
            </li>`;
        });
        c.innerHTML = html + '</ul>';
        m.classList.add('active');
    } catch (e) { }
}

function closeDetailModal() {
    document.getElementById('detail-modal').classList.remove('active');
}

// 保持2秒轮询，实时同步
loadData();
setInterval(loadData, 2000);
</script>
